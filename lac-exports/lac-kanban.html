vasion))\n}"},{"label":"Monster evasion from speed","snippet":"const monsterEvasion = monster.speed * 0.15 // Skeleton (0.8) → 0.12, Blood Hawk (1.5) → 0.225"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-038","title":"Infinite Difficulty Tiers","status":"frozen","problem":"Floor scaling stops at floor 10 with no endgame. A 3-tier system (Normal/Nightmare/Hell) has a hard ceiling. Need infinite tiers so gear acquired at any point has a harder tier to push into, and the designer can add godly gear without a cap.","schemaVersion":1,"analysis":"gameStore has floor (1–10) with no tier concept. maxHpForFloor and buildPlayerStats scale linearly with floor only. Monster scaling in combat.ts uses floor multiplier only. The plan's 3-tier model (Normal/Nightmare/Hell) creates a hard ceiling — infinite numeric tiers remove that ceiling and make gear perpetually relevant as the designer can always introduce harder content.","decisions":[{"decision":"Infinite numeric tiers instead of named Normal/Nightmare/Hell","rationale":"No hard ceiling means the designer can always introduce harder content. Named tiers imply finality; numbers imply an open ladder.","alternativesConsidered":["3-tier D2 model (Normal/Nightmare/Hell)","Prestige system that resets gear on tier unlock"],"date":"2026-03-28"},{"decision":"Tier persists across deaths; floor resets to 1 on death within a tier","rationale":"Death is a floor-level setback, not a tier-level setback. Losing a tier would feel too punishing given the graveyard sacrifice also occurs.","alternativesConsidered":["Death drops you one tier","Death resets both tier and floor"],"date":"2026-03-28"},{"decision":"Monster multiplier: HP = 1 + (tier-1)*0.5, damage = 1 + (tier-1)*0.35","rationale":"Additive scaling prevents absurd numbers at high tiers while keeping each tier noticeably harder. Tier 5 monsters have 3x HP — challenging but not impossible with tier-appropriate gear.","alternativesConsidered":["Exponential multiplier (doubles each tier)","Only damage scales, not HP"],"date":"2026-03-28"},{"decision":"Loot MF bonus: (tier-1)*20 added to magicFind for all loot rolls","rationale":"Ensures higher tiers are always more rewarding in quality, not just harder. The gear treadmill needs a carrot, not just a stick.","alternativesConsidered":["Flat loot table per tier (new item pool)","No loot quality boost — only difficulty increases"],"date":"2026-03-28"},{"decision":"Track first-time tier clears in careerStats.tiersCleared: number[]","rationale":"Allows the TierClearOverlay to distinguish a first-time clear from a repeat. First clears get a special '✦ FIRST CLEAR ✦' eyebrow for recognition without permanently changing the flow.","alternativesConsidered":["Boolean flag per tier in a map","Always show first-clear banner (no tracking)"],"date":"2026-03-31"},{"decision":"Ascension mechanic: ASCEND button on victory screen pre-loads Ghost Echo from last graveyard entry","rationale":"Ascension is a deliberate prestige-style restart that keeps tier progress, increments an ascension counter, and rewards the player with a Ghost Echo head-start — making the loop feel rewarding rather than punitive.","alternativesConsidered":["Ascension just restarts with no bonus","Ascension drops one tier"],"date":"2026-03-31"}],"implementation":"1. gameStore: `tier: number` (starts 1, persists across deaths). `careerStats.tiersCleared: number[]` tracks first-time tier completions. `careerStats.ascensions: number` counts prestige loops. `firstTimeTierClear: number | null` in-memory flag set by nextFloor, read by GridScreen, cleared by clearFirstTimeTierClear(). 2. nextFloor(): when floor >= 10, detects isFirstClear = !tiersCleared.includes(completedTier), sets firstTimeTierClear, appends to tiersCleared, resets floor to 1, increments tier. 3. endRun(): preserves tiersCleared and ascensions in updatedCareerStats across every run. 4. ascendRun(): increments careerStats.ascensions, pre-loads ghostCharm from last graveyard entry, resets floor/hp/mana to floor 1 values. 5. Monster stat multiplier: hpMult = 1 + (tier-1) * 0.5, damageMult = 1 + (tier-1) * 0.35 — applied in combatStore startCombat. 6. Loot quality bonus MF: (tier-1) * 20 added to magicFind for loot rolls. 7. HUD: shows T{tier}·F{floor} badge with optional boss skull. 8. gridStore.initFloor uses tier in seed: seed ^ (floor * 0x1337) ^ (tier * 99991). 9. TierClearOverlay: enhanced with isFirstTime prop — shows '✦ FIRST CLEAR ✦' eyebrow and extra gold label on first-time clears. 10. MainMenu: ascension badge '✦×N' shown when careerStats.ascensions > 0. 11. Victory screen: ASCEND button shown when graveyard has entries; triggers ascendRun() and navigates to classSelect.","knownLimitations":["No tier-specific monster pool — same monsters appear at all tiers, just scaled","No visual theme change per tier in v1","Very high tiers (20+) untested for balance"],"tags":["progression","difficulty","tiers","scaling","endgame","gamestore"],"annotations":[],"lineage":{"children":["feat-2026-062"]},"successCriteria":"Clearing floor 10 increments tier and resets to floor 1. Monster HP and damage scale correctly per tier formula. HUD shows both tier and floor. Loot improves at higher tiers. Death resets floor to 1 but not tier. First-time tier clears show the '✦ FIRST CLEAR ✦' variant of TierClearOverlay. careerStats.tiersCleared accumulates correctly and persists. Ascension button available on victory screen when graveyard is non-empty; ascendRun() increments ascensions and pre-loads Ghost Echo.","domain":"progression","statusHistory":[{"from":"draft","to":"active","date":"2026-03-28"},{"from":"active","to":"frozen","date":"2026-03-28"}],"revisions":[{"date":"2026-03-28","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial fill from design session"},{"date":"2026-03-28","author":"claude","fields_changed":["decisions"],"reason":"Fix decisions schema"},{"date":"2026-03-31","author":"claude","fields_changed":["decisions","implementation","successCriteria"],"reason":"BMAD session 2: add tiersCleared[], ascensions, firstTimeTierClear, ascendRun(), first-clear TierClearOverlay variant, ASCEND button, ascension badge — all implemented and verified"}],"userGuide":"**Tiers** are the infinite difficulty ladder of this game. When you clear floor 10, you ascend to the next tier — the HUD badge (e.g. T2·F7) always shows where you stand.\n\n**Monster scaling:** Each tier multiplies monster HP by `1 + (tier-1) × 0.5` and damage by `1 + (tier-1) × 0.35`. Tier 2 monsters have 150% HP and 135% damage; Tier 5 monsters have 300% HP and 240% damage. There is no ceiling.\n\n**Loot bonus:** Each tier above 1 adds `(tier-1) × 20` to your Magic Find for every loot roll — higher tiers always drop better gear.\n\n**Death:** Resets your floor to 1 but never your tier. You always fight at the difficulty you have earned.\n\n**First clears:** The very first time you clear a tier, the TIER COMPLETE overlay shows a special gold '✦ FIRST CLEAR ✦' banner. Repeat clears show a standard overlay.\n\n**Ascension:** On the victory screen, if your graveyard has items, you can press ASCEND instead of returning to the menu. Ascending increments your ascension count (shown as ✦×N on the main menu), starts a new run at the same tier and level, and pre-loads a Ghost Echo from your most recently sacrificed item — giving you a spectral head-start.","componentFile":"src/store/gameStore.ts","npmPackages":[],"publicInterface":[{"name":"tier","type":"number (gameStore)","description":"Current difficulty tier, starts at 1, increments on floor-10 clear, persists across deaths"},{"name":"firstTimeTierClear","type":"number | null (gameStore, in-memory only)","description":"Set to the completed tier number when cleared for the first time; GridScreen reads it to show the special overlay variant, then calls clearFirstTimeTierClear()"},{"name":"careerStats.tiersCleared","type":"number[] (gameStore, persisted)","description":"Array of tier numbers that have been cleared at least once; drives first-time detection"},{"name":"careerStats.ascensions","type":"number (gameStore, persisted)","description":"How many times the player has used the ASCEND mechanic (prestige restarts)"},{"name":"clearFirstTimeTierClear","type":"() => void (gameStore action)","description":"Clears firstTimeTierClear back to null after the overlay has been dismissed"},{"name":"ascendRun","type":"(seed?: number) => void (gameStore action)","description":"Prestige-restart: increments ascensions, pre-loads Ghost Echo from last graveyard entry, resets to floor 1"},{"name":"tierMonsterMultiplier","type":"(tier: number) => { hp: number, damage: number }","description":"Returns stat multipliers for monsters at the given tier (used in combatStore)"}],"externalDependencies":[],"lastVerifiedDate":"2026-03-31","codeSnippets":[{"label":"Tier monster multipliers (combatStore)","snippet":"// hpMult = 1 + (tier-1)*0.5,  damageMult = 1 + (tier-1)*0.35\nconst hpMult  = 1 + (tier - 1) * 0.5\nconst dmgMult = 1 + (tier - 1) * 0.35"},{"label":"nextFloor: first-time tier clear detection","snippet":"if (s.floor >= 10) {\n  const completedTier = s.tier\n  const isFirstClear  = !s.careerStats.tiersCleared.includes(completedTier)\n  const tiersCleared  = isFirstClear\n    ? [...s.careerStats.tiersCleared, completedTier]\n    : s.careerStats.tiersCleared\n  set({\n    tier: s.tier + 1,\n    floor: 1,\n    firstTimeTierClear: isFirstClear ? completedTier : null,\n    careerStats: { ...s.careerStats, tiersCleared },\n  })\n}"},{"label":"ascendRun action","snippet":"ascendRun: (seed?) => {\n  const s = get()\n  const lastEntry = s.graveyard.length > 0 ? s.graveyard[s.graveyard.length - 1] : null\n  set({\n    floor: 1,\n    seed: seed ?? Date.now(),\n    screen: 'grid',\n    runStarted: true,\n    ghostCharm: lastEntry?.item ?? null,\n    careerStats: { ...s.careerStats, ascensions: s.careerStats.ascensions + 1 },\n  })\n  scheduleSave()\n}"},{"label":"TierClearOverlay first-time variant","snippet":"<Text style={styles.eyebrow}>\n  {isFirstTime ? '✦ FIRST CLEAR ✦' : 'TIER COMPLETE'}\n</Text>\n{isFirstTime && (\n  <Text style={styles.firstTimeLabel}>\n    You cleared Tier {tier - 1} for the first time!\n  </Text>\n)}"},{"label":"MainMenu ascension badge","snippet":"{ascensions > 0 && (\n  <View style={menuStyles.ascensionBadge}>\n    <Text style={menuStyles.ascensionBadgeText}>✦×{ascensions}</Text>\n  </View>\n)}"},{"label":"Victory screen ASCEND button","snippet":"{won && graveyard.length > 0 && (\n  <TouchableOpacity\n    style={endStyles.ascendBtn}\n    onPress={() => { ascendRun(); setScreen('classSelect') }}\n  >\n    <Text style={endStyles.ascendBtnText}>⬆ ASCEND</Text>\n    <Text style={endStyles.ascendBtnSub}>Start fresh · Ghost Echo pre-loaded</Text>\n  </TouchableOpacity>\n)}"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-046","title":"Item Expansion — New Bases, Uniques & Runewords","status":"frozen","problem":"The item pool is thin — 8 weapon types, 3 shields, 3 helms, 3 chests, no two-handed weapons, no bows, no belts. Unique items (fixed-stat legendaries) don't exist at all. The runeword list covers only 3 words. Players have no aspirational gear targets and loot excitement fades quickly after the first few floors.","schemaVersion":1,"analysis":"BASE_ITEMS in items.ts has 25 entries covering 8 weapon types, 3 shields, 3 helms, 3 chests, 2 gloves, 2 legs, 2 boots, ring, amulet, 3 charms, potions, 10 runes. No two-handed weapons, no bows, no belts. UNIQUE_ITEMS in loot.ts has a handful of entries. RUNEWORDS in runewords.ts covers only the basic set. No set item system. Expanding items.ts, loot.ts UNIQUE_ITEMS, and runewords.ts covers all three gaps with no new engine work required.","decisions":[{"decision":"Belt is a new equipment slot, not stored in bag","rationale":"Belts in D2 provided utility and are a meaningful equip slot. Adding it as an equip slot (not a bag-only item) gives players another progression axis.","alternativesConsidered":["Belt as charm-like passive in bag — doesn't feel like gear","Skip belts entirely — misses a natural slot"],"date":"2026-03-29"},{"decision":"15 new uniques, all with 2–3 distinctive stats rather than many small bonuses","rationale":"D2's best uniques are remembered for 1-2 defining properties. Goldwrap = MF. Stone of Jordan = mana/spellPower. Each unique should have an identity that creates a build around it.","alternativesConsidered":["Many stats at low values — forgettable, hard to build around"],"date":"2026-03-29"},{"decision":"Runewords target specific slots (e.g. Leaf→staff only)","rationale":"Slot restrictions create meaningful crafting decisions. 'Save my Tal rune for a staff' is interesting. Unrestricted runewords reduce choice.","alternativesConsidered":["Any runeword in any socketed base — trivializes socket planning"],"date":"2026-03-29"}],"implementation":"1. src/data/items.ts — new base items: two_handed_sword, battle_axe, war_axe, hand_axe, short_bow, long_bow, belt (new 'belt' slot), circlet (helmet variant), throwing_knife. Add 'belt' to ItemSlot type. EquipmentPanel gains belt slot. 2. engine/loot.ts UNIQUE_ITEMS array — 15 new uniques across weapons, armor, rings, amulets, belts, circlets. Static imports at file top: `import { matchRuneword, getRunewordById } from '../data/runewords'` and `import { getRecipeById } from '../data/recipes'` (replaces previous dynamic require() calls in computeEffectiveStats and transmute). 3. nextUid() is a stateless function (no module-level counter): `function nextUid(): string { return \\`item_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 11)}\\` }`. Removes the old `let _uid = 0` mutable module-level counter. 4. computeEffectiveStats: uses getRunewordById(runewordId) (static import) instead of require('../data/runewords'). 5. transmute(): uses getRecipeById from static import instead of require('../data/recipes'). 6. src/data/runewords.ts — 8 new runewords: Stealth, Leaf, Strength, Zephyr, Lore, Smoke, Malice, Spirit. 7. EquipmentPanel.tsx — adds belt slot visually. 8. inventoryStore.ts — belt added to EquipSlot type.","knownLimitations":["No set item system in v1 — set bonuses deferred to future phase","Two-handed weapons share the weapon slot only (no offhand restriction enforced)","Bows have no ranged mechanics — they deal damage same as melee in v1","nextUid() uses Math.random() — not seeded, so uid generation is non-deterministic by design (uids are identifiers, not game logic)"],"tags":["items","loot","runewords","uniques","content"],"annotations":[],"lineage":{"parent":"feat-2026-034","children":["feat-2026-069"]},"successCriteria":"35+ base item types. 20+ unique items defined. 11+ runewords. Belt slot functional in equipment panel. At least one aspirational unique per equipment category.","domain":"game/items","statusHistory":[{"from":"draft","to":"active","date":"2026-03-29"},{"from":"active","to":"frozen","date":"2026-03-29"}],"revisions":[{"date":"2026-03-29","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition for item expansion"},{"date":"2026-03-31","author":"claude","fields_changed":["implementation"],"reason":"BMAD session 2: stateless nextUid() (removes let _uid counter), static imports of getRunewordById and getRecipeById (removes dynamic require in hot paths)"}],"userGuide":"## New Items\n\nThe item pool now includes two-handed weapons, bows, belts, and circlets. Unique items drop with fixed stats and a golden name — these are the items you build characters around.\n\n**Unique highlights:**\n- Stone of Jordan (ring): +60 mana, +10 spell power — the Sorcerer's best-in-slot ring\n- Goldwrap (belt): +40% magic find — the loot hunter's dream\n- Harlequin Crest (circlet): balanced across all stats, the rarest drop\n- Shadowweave Robe: the Rogue's signature armor\n\n**New Runewords (highlight):**\n- Stealth [Tal+Eth] → chest: fast, crit-focused light armor\n- Spirit [Tal+Thul+Ort+Amn] → weapon: end-game caster runeword\n- Lore [Ort+Sol] → helmet: budget all-resist + spell power","componentFile":"src/data/items.ts, src/engine/loot.ts, src/data/runewords.ts, src/store/inventoryStore.ts, src/components/EquipmentPanel.tsx","npmPackages":[],"publicInterface":[{"name":"ItemSlot (belt)","type":"type extension","description":"New 'belt' slot added to ItemSlot union"},{"name":"EquipSlot (belt)","type":"type extension","description":"New 'belt' slot added to EquipSlot union in inventoryStore"},{"name":"UNIQUE_ITEMS (expanded)","type":"UniqueItemDef[]","description":"15 new unique item definitions added to loot.ts"},{"name":"RUNEWORDS (expanded)","type":"RunewordDef[]","description":"8 new runeword definitions added to runewords.ts"}],"externalDependencies":[],"lastVerifiedDate":"2026-03-31","codeSnippets":[{"label":"nextUid — stateless, no shared counter","snippet":"function nextUid(): string {\n  return `item_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 11)}`\n}\n// replaces: let _uid = 0; function nextUid() { return `item_${++_uid}` }"},{"label":"Static imports at loot.ts top (no dynamic require)","snippet":"import { matchRuneword, getRunewordById } from '../data/runewords'\nimport { getRecipeById } from '../data/recipes'\n\n// These replace:\n// const { getRunewordById } = require('../data/runewords')  // inside computeEffectiveStats\n// const { getRecipeById } = require('../data/recipes')      // inside transmute()"},{"label":"Stone of Jordan unique definition","snippet":"{ id: 'stone_of_jordan', name: 'Stone of Jordan', baseId: 'ring',\n  stats: { mana: 60, spellPower: 10 },\n  description: 'The power of the Jordan Stone.' },"},{"label":"Spirit runeword definition","snippet":"{ id: 'spirit', name: 'Spirit',\n  runes: ['rune_tal', 'rune_thul', 'rune_ort', 'rune_amn'],\n  allowedSlots: ['weapon', 'offhand'],\n  stats: { spellPower: 22, mana: 89, defense: 35, life: 20 } },"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-064","title":"Monster blocking — enemy block chance + UI feedback","status":"draft","problem":"Block chance is computed for the player but monsters never block player attacks. The block% stat is not surfaced anywhere in the UI (inventory, combat log, or stats panel), so players have no way to know if their gear provides block.","schemaVersion":1,"tags":["combat","blocking","offhand","shield","defense","physical"],"lineage":{"parent":"feat-2026-041","spawnReason":"deferred mechanic: monster blocking was noted as not implemented; block% UI omission was a known gap"},"domain":"combat"},{"featureKey":"feat-2026-035","title":"Phase 1 — Text UI Prototype","status":"frozen","problem":"The engine is proven (94 tests green) but there is no playable game yet. We need a fully playable loop — grid exploration, combat, loot, and inventory — using only text labels and colored boxes (no pixel art, no Skia). Fun must be validated on a real device before any art work begins.","schemaVersion":1,"analysis":"All engine systems are proven (94 tests, 0 failures). Phase 1 connects them to a minimal React Native UI. Grid: 50×50 rendered as colored View cells in a viewport (no Skia yet — ScrollView with absolute positioning). Combat: a single screen showing monster name+affixes, HP bars as View widths, and three buttons (Attack/Potion/Flee). Inventory: flat ScrollView list of Item cards with Equip button. Navigation: simple React state machine (screen enum), no react-navigation overhead at this stage. HUD overlays stamina bar + HP + floor depth on the grid screen. Goal: validate the core fun loop on a real device before committing to pixel art.","decisions":[{"decision":"React state machine (screen enum) instead of react-navigation for Phase 1","rationale":"react-navigation adds ~2MB and requires native linking. For a prototype validating fun, a simple currentScreen state switch is faster to implement and debug. Can migrate to react-navigation in Phase 3 when screens multiply.","alternativesConsidered":["react-navigation — correct long-term but heavy for a prototype","expo-router — even heavier, file-based routing overkill for 4 screens"],"date":"2026-03-28"},{"decision":"Grid rendered as View cells (not Skia) in Phase 1","rationale":"Skia adds native build complexity. For a text prototype, RN View cells are sufficient to validate movement feel and encounter triggers. Skia canvas is Phase 5 (polish). The engine grid logic is completely decoupled from rendering so the swap is a UI-only change.","alternativesConsidered":["Skia from day 1 — correct for production but slows down prototype iteration"],"date":"2026-03-28"}],"implementation":"1. STORES: Zustand slices — gridStore (floor generation, fog, player pos, stamina), combatStore (active monster, round log, player HP), inventoryStore (flat list + equipped slots), gameStore (floor depth, seed, run state). 2. GRID SCREEN: FlatList of rows, each row is a FlatList of cells (View 16×16px). Tile colors: Wall=black, Floor=dark gray, Exit=green, Fog=near-black. Player dot = white circle. D-pad: 4 arrow buttons fixed at bottom-left. Swipe detection via PanResponder. 3. COMBAT SCREEN: Modal overlay. Monster display name + affix badges as colored Text. HP bars: View with width% style. Round log: last 3 lines as Text. Three buttons: Attack (red), Potion (green, disabled if 0), Flee (gray). 4. LOOT SCREEN: After combat victory, show dropped items with quality color. Tap to pick up (auto-place in inventory) or Leave. 5. INVENTORY SCREEN: ScrollView of ItemCard rows. Each card shows name (quality color), size, sockets, stats. Equip button swaps with current slot item. 6. HUD: absolute positioned overlay on GridScreen — stamina bar top-left, HP top-right, floor number top-center.","knownLimitations":["No pixel art — colored boxes only","No Skia canvas — performance may suffer at 50×50 with many View cells (acceptable for prototype)","Inventory is flat list, not Tetris grid (Phase 3)","No save/load yet (Phase 4)","No sound (Phase 5)"],"tags":["game","react-native","prototype","ui","zustand"],"annotations":[],"lineage":{"parent":"feat-2026-034","spawnReason":"scope split: Phase 1 text UI prototype — playable 5-floor run with colored View grid, D-pad controls, combat transaction screen, flat-list inventory"},"successCriteria":"- Player can move on the grid with D-pad and swipe\n- Fog of war reveals as player explores\n- Stepping on nodes triggers encounters (combat, chest, shrine)\n- Combat screen shows monster name, affixes, HP bars, and 3 action buttons\n- Fight resolves round by round with visible damage numbers\n- After victory, loot screen shows colored item names to pick up\n- Inventory screen lists all items with equip button\n- HUD shows HP, stamina, floor depth at all times\n- Player can descend to next floor via exit tile\n- Full 5-floor run is completable without crashes","domain":"game/mobile","statusHistory":[{"from":"draft","to":"active","date":"2026-03-28"},{"from":"active","to":"frozen","date":"2026-03-28"}],"revisions":[{"date":"2026-03-28","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial Phase 1 feature definition — connecting proven engine to minimal text UI"}],"userGuide":"## Dev Testing\n1. `expo start` — scan QR with Expo Go on iOS\n2. Move with D-pad or swipe on the grid\n3. Encounter triggers automatically on unvisited tiles\n4. In combat: tap Attack repeatedly, use Potion if low HP, Flee if outmatched\n5. Pick up items after combat — colored names indicate quality\n6. Tap inventory icon (top-right) to manage gear\n7. Find the green exit tile to go deeper\n\n## Debug\n`bun run debug:state` — print current game state to console","componentFile":"App.tsx, src/store/gridStore.ts, src/store/combatStore.ts, src/store/inventoryStore.ts, src/store/gameStore.ts, src/screens/GridScreen.tsx, src/screens/CombatScreen.tsx, src/screens/LootScreen.tsx, src/screens/InventoryScreen.tsx, src/components/DPad.tsx, src/components/HUD.tsx, src/components/ItemCard.tsx","npmPackages":["zustand","expo","react-native"],"publicInterface":[],"externalDependencies":[],"lastVerifiedDate":"2026-03-28","codeSnippets":[{"label":"gridStore — move player and trigger encounter","snippet":"const { movePlayer, currentEncounter } = useGridStore()\nmovePlayer('right')  // advances position, rolls encounter, updates fog\n// if currentEncounter !== null, GridScreen switches to CombatScreen"},{"label":"Quality color helper","snippet":"const QUALITY_COLORS = {\n  normal: '#ffffff',\n  magic:  '#4444ff',\n  rare:   '#ffff00',\n  unique: '#c8a020',\n}\n// Apply to Text style: color: QUALITY_COLORS[item.quality]"}]},{"featureKey":"feat-2026-063","title":"Poison damage implementation + status effect visuals","status":"draft","problem":"Poison damage type is defined in the schema but never dealt — no monster or item applies poison DoT. Status effects (burn, chill, poison) have no visual indicator on the grid or combat log. Players cannot tell if they or enemies are afflicted.","schemaVersion":1,"tags":["combat","elements","fire","cold","lightning","resistance","status-effects"],"lineage":{"parent":"feat-2026-039","spawnReason":"deferred mechanic: poison was listed as a known gap in the elemental combat feature; status visuals were out of scope"},"domain":"combat"},{"featureKey":"feat-2026-036","title":"Roguelite Persistence & Graveyard","status":"frozen","problem":"On death the entire run resets — loot, gear, progress. This punishes investment in the loot system which is the core of the game. Need a death model that keeps equipped gear across runs but still has real stakes.","schemaVersion":1,"analysis":"gameStore.endRun(false) handles defeat. inventoryStore holds bag (run-scoped) and equipped (cross-run). The bag is run-scoped — cleared on death. Equipped items carry across runs, but one is sacrificed each death. The graveyard is a permanent session record (Zustand in-memory, persisted via AsyncStorage save).","decisions":[{"decision":"Career stats persisted across runs via AsyncStorage (save/load in persistence.ts)","rationale":"Career stats are cross-run motivators — they must survive app restarts to have meaning.","date":"2026-03-28"},{"decision":"Graveyard stores items lost on death for Ghost Echo mechanic (UI only — mechanic not yet live)","rationale":"Graveyard data structure is ready; the Ghost Echo activation mechanic is deferred until the core loop is stable.","date":"2026-03-28"},{"decision":"BMAD S3: dailyStreak + lastRunDate added to CareerStats — ISO date comparison in endRun","rationale":"Daily streak incentivises return visits; ISO YYYY-MM-DD string comparison is simple and timezone-stable for the common case.","date":"2026-04-01"},{"decision":"BMAD S3: streak resets to 1 on a missed day, increments if played on consecutive days, shown as fire emoji on MainMenu when streak is 2 or more","rationale":"Threshold of 2 avoids showing the streak indicator on day 1 of a new streak where it carries no meaning.","date":"2026-04-01"},{"decision":"BMAD S3: runKills and runItemsFound track per-run stats, reset on startRun, shown in EndScreen run summary card","rationale":"Per-run stats give players a sense of accomplishment even on a losing run; reset on startRun ensures no carry-over.","date":"2026-04-01"},{"decision":"BMAD S3: lastStandUsed boolean added to GameState — single death-defiance per run, survives at 1 HP, fires in both attackAction and skillAction defeat paths","rationale":"Single-use keeps it rare and meaningful. Covering both defeat paths (attack and skill) ensures no edge case skips it.","date":"2026-04-01"}],"implementation":"1. Add GraveyardEntry type: { item: Item, floor: number, tier: number, level: number, lostAt: string (ISO date), classId?: ClassId | null, killedBy?: string }. 2. gameStore: add graveyard: GraveyardEntry[] and lastSacrifice: GraveyardEntry | null. 3. endRun(false): (a) pick 1 quality-weighted item from EQUIPPED ITEMS ONLY → graveyard; (b) clear entire bag (createInventory()); (c) non-sacrificed equipped items survive. 4. On new run start (ClassSelectScreen doDescend): refillPotions() clears any leftover potions (bag already empty), then adds 3 HP + 1 mana potion. 5. GraveyardScreen: ScrollView of GraveyardEntry cards. 6. GameOver screen: shows sacrificed item name. 7. Ghost Echo: GraveyardScreen exposes invokeGhostEcho(entryIndex) — sets ghostCharm: entry.item in gameStore. When active, GridScreen reads ghostCharm and passes it to combatStore; the charm grants 25% of the item's stats for 1 floor, then clears on nextFloor(). 8. Ghost Echo ambient hint: shown in GridScreen after 2 seconds when graveyard.length > 0 and no ghostCharm is active and hasSeenGhostEchoHint is false (settingsStore). Hint auto-dismisses after 4 seconds and calls markGhostEchoHintSeen() so it only ever shows once.","knownLimitations":["Ghost Echo mechanic (use graveyard items as one-floor power) is UI note only — not implemented","Daily streak uses UTC dates — players crossing midnight in non-UTC timezone may see unexpected streak breaks"],"tags":["persistence","roguelite","death-penalty","graveyard","asyncstorage"],"annotations":[{"id":"reopen-1775065873938","author":"lac advance","date":"2026-04-01","type":"reopen","body":"BMAD session 3: added daily streak tracking (dailyStreak+lastRunDate in CareerStats), per-run kill/item counters (runKills/runItemsFound), Last Stand single death-defiance per run (lastStandUsed flag), EndScreen run summary card"}],"lineage":{"children":["feat-2026-056","feat-2026-057","feat-2026-060"]},"successCriteria":"Death with equipped items always produces 1 graveyard entry (from equipped pool). Bag is always fully cleared on death regardless of contents. No equipped item other than the sacrifice is removed. Next run always starts with 3 HP + 1 mana potion (doDescend). Graveyard persists across app restarts. GameOver screen names the sacrificed item. Death with no equipped items clears bag and produces no graveyard entry.","domain":"progression","statusHistory":[{"from":"draft","to":"active","date":"2026-03-28"},{"from":"active","to":"frozen","date":"2026-03-28"},{"from":"frozen","to":"active","date":"2026-03-31","reason":"Death mechanic redesign: bag always wiped on death, sacrifice pool changed to equipped-only"},{"from":"active","to":"frozen","date":"2026-03-31"},{"from":"frozen","to":"active","date":"2026-04-01","reason":"BMAD session 3: added daily streak tracking (dailyStreak+lastRunDate in CareerStats), per-run kill/item counters (runKills/runItemsFound), Last Stand single death-defiance per run (lastStandUsed flag), EndScreen run summary card"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-03-28","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial fill from design session"},{"date":"2026-03-28","author":"claude","fields_changed":["decisions"],"reason":"Fix decisions schema — objects with decision/rationale/alternativesConsidered/date"},{"date":"2026-03-29","author":"claude","fields_changed":["implementation","decisions","knownLimitations","publicInterface","codeSnippets","userGuide","codexEntry"],"reason":"Sync to actual implementation: AsyncStorage deferred → Zustand in-memory; GraveyardEntry gains classId+level; stash safety note added to userGuide"},{"date":"2026-03-31","author":"claude","fields_changed":["problem","analysis","implementation","decisions","successCriteria","userGuide","codexEntry","knownLimitations","codeSnippets"],"reason":"Death mechanic redesign: sacrifice pool changed from bag+equipped to equipped-only; bag is now always wiped on death; fresh 3HP+1MP pots given on next run start"},{"date":"2026-03-31","author":"claude","fields_changed":["implementation"],"reason":"BMAD session 2: add Ghost Echo mechanic (invokeGhostEcho, ghostCharm, ambient hint via hasSeenGhostEchoHint), update userGuide and codeSnippets"},{"date":"2026-04-01","author":"claude+marc","fields_changed":["decisions"],"reason":"BMAD session 3 — daily streak, run summary stats, Last Stand mechanic"}],"userGuide":"Your equipped gear survives death — but fate claims one piece as tribute. The sacrifice is drawn from your equipped items only, quality-weighted (a Unique is 40× more likely to be taken than a Normal). Your bag is always wiped on death — run loot does not carry forward.\n\nOn your next run you start with exactly 3 HP potions and 1 mana potion.\n\n**Important:** Items in the shared stash are NEVER at risk — only equipped items are in the sacrifice pool. If you want to protect a piece of gear, deposit it to the stash in town before a dangerous fight.\n\nIf you die with no equipped items, no graveyard entry is created (bag is still wiped).\n\n**Ghost Echo:** Open the Graveyard screen (accessible from the main menu and the post-death screen) and tap any entry to invoke that item as a Ghost Echo. You gain 25% of its stats for exactly 1 floor — after descending or dying, the echo fades. Only one echo can be active at a time. A one-time ambient hint appears on the dungeon grid to help you discover this mechanic.","componentFile":"src/screens/GraveyardScreen.tsx","npmPackages":["@react-native-async-storage/async-storage"],"publicInterface":[{"name":"GraveyardEntry","type":"TypeScript interface","description":"{ item: Item, floor: number, tier: number, level: number, lostAt: string, classId?: ClassId | null, killedBy?: string }"},{"name":"GraveyardScreen","type":"React.FC","description":"Full-screen list of all items lost to death, accessible from MainMenu and post-death EndScreen. Tap an entry to invoke Ghost Echo."},{"name":"invokeGhostEcho","type":"(entryIndex: number) => void (gameStore action)","description":"Sets ghostCharm to the graveyard entry's item — grants 25% stats for 1 floor. No-ops if echo already active."},{"name":"ghostCharm","type":"Item | null (gameStore)","description":"Active Ghost Echo item; cleared by nextFloor() and clearGhostCharm()"}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"Quality-weighted sacrifice from equipped items only","snippet":"const QUALITY_WEIGHT = { unique: 40, rare: 20, magic: 5, normal: 1 }\nconst equippedItems = Object.values(equipped).filter(Boolean)\nconst pool = equippedItems.flatMap(item => Array(QUALITY_WEIGHT[item.quality] ?? 1).fill(item))\nconst sacrificed = pool[Math.floor(rng() * pool.length)]"},{"label":"Atomic bag wipe + equipped sacrifice in one setState","snippet":"inventoryStore.setState((s) => {\n  const newEquipped = { ...s.equipped }\n  if (equipSlot) delete newEquipped[equipSlot]\n  const emptyBag = createInventory()\n  return { equipped: newEquipped, bag: emptyBag, magicFind: calcMF(newEquipped, emptyBag) }\n})"},{"label":"Graveyard entry with killedBy","snippet":"const entry: GraveyardEntry = {\n  item:    { ...sacrificed, identified: true },\n  floor, tier, level,\n  lostAt:  new Date().toISOString(),\n  classId, killedBy,\n}"},{"label":"Ghost Echo invocation (gameStore)","snippet":"invokeGhostEcho: (entryIndex) => {\n  const { graveyard, ghostCharm } = get()\n  if (ghostCharm) return   // already active — one echo at a time\n  const entry = graveyard[graveyard.length - 1 - entryIndex]  // sorted reversed\n  if (!entry) return\n  set({ ghostCharm: entry.item })\n},"},{"label":"Ghost Echo ambient hint (GridScreen)","snippet":"// Shows once when graveyard has items and no echo is active\nuseEffect(() => {\n  if (hasSeenGhostEchoHint || ghostCharm || graveyard.length === 0) return\n  const t1 = setTimeout(() => setGhostEchoHint(true), 2000)\n  const t2 = setTimeout(() => {\n    setGhostEchoHint(false)\n    markGhostEchoHintSeen()\n  }, 6000)\n  return () => { clearTimeout(t1); clearTimeout(t2) }\n}, [])"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-060","title":"Roguelite Persistence — Ghost Echo live + deferred mechanics","status":"draft","problem":"feature.json documents Ghost Echo as \"UI only — not yet live\" but the invokeGhostEcho action is fully implemented and wired in GridScreen. Additionally: careerStats.floorDeaths is never reset between runs, meta-progression bonuses (unlockables) are not yet defined, and the graveyard has no cap.","schemaVersion":1,"tags":["persistence","roguelite","death-penalty","graveyard","asyncstorage"],"lineage":{"parent":"feat-2026-036","spawnReason":"stale documentation + deferred mechanics: correct Ghost Echo status, define meta-progression unlockables, add graveyard cap"},"domain":"progression"},{"featureKey":"feat-2026-055","title":"Room Grammar — Charnel & Sanctum Encounter Bias","status":"frozen","problem":"BSP-generated rooms are geometrically varied but semantically identical — every room has the same encounter distribution regardless of shape. Long corridor rooms and wide open chambers roll the same odds. Players cannot read the dungeon before engaging it, removing a layer of spatial decision-making.","schemaVersion":1,"analysis":"BSP dungeon generation produces rooms of varied geometry but uniform encounter distribution. Three room archetypes emerge naturally from shape metrics: Charnel (aspect ratio ≥ 2.5 — narrow corridors) biased toward elites and ancients; Sanctum (area ≥ 30 and ratio < 1.8 — wide squares) biased toward shrines and chests; Standard (everything else) unchanged. Classified at floor generation time, stored alongside rooms in gridStore, and applied as a weight multiplier before every encounter roll. Players learn the grammar in ~3 floors without a tutorial — narrow red-tinged passages signal danger, wide chambers signal reward.","decisions":[{"decision":"Classify rooms by geometry (aspect ratio + area) rather than random assignment","rationale":"Seeded generation means room shapes are deterministic — classifying by geometry makes the grammar consistent and learnable. A Charnel room is always narrow; the player's visual read of the corridor predicts the encounter type.","alternativesConsidered":["Random per-room type tag — breaks the visual grammar and makes the dungeon unreadable","Hand-placed special rooms — requires non-BSP generation and loses the procedural seed guarantee"],"date":"2026-04-01"},{"decision":"Bias encounter weights, not override them — room type adjusts probabilities, not outcomes","rationale":"A Charnel room that guarantees an elite every step would feel oppressive and exploit-prone. Biasing weights preserves variance and the seeded PRNG's run-reproducibility while still making the room type meaningful.","alternativesConsidered":["Hard override (Charnel always spawns elite) — predictable to the point of feeling scripted"],"date":"2026-04-01"}],"implementation":"grid.ts: added RoomType enum (Standard/Charnel/Sanctum), exported Room interface, classifyRooms(rooms) assigns type by aspect ratio and area, getRoomTypeAt(rooms, roomTypes, pos) looks up the type for any grid position. generateFloor() now returns roomTypes[] alongside rooms[]. gridStore: added rooms: Room[] and roomTypes: RoomType[] to GridState; initFloor populates both from generateFloor; movePlayer calls getRoomTypeAt(rooms, roomTypes, next) before rollEncounter and applies inline weight bias — Charnel: elite×3, ancient×2, shrine/chest≈0; Sanctum: shrine×5, chest×4, elite×0.3; Standard: unmodified floorPacingWeights.","knownLimitations":["Corridor tiles between rooms always resolve as Standard (no room boundary lookup for non-room floor tiles)","Room classification is purely geometric — no hand-authored control over special rooms","Visual distinction between room types not yet implemented (no floor tint difference)"],"tags":["grid","dungeon","bsp","encounter","procedural","room-grammar"],"annotations":[],"lineage":{"parent":"feat-2026-045","children":["feat-2026-075"],"spawnReason":"scope split: new dungeon intelligence layer not covered by boss-encounters — room shape now controls encounter bias"},"successCriteria":"Charnel rooms produce measurably higher elite/ancient encounter rates than Standard rooms at the same floor depth (verifiable via sim:floors). Sanctum rooms produce measurably higher shrine/chest rates. TypeScript 0 errors. Existing grid.test.ts and encounter.test.ts pass unchanged.","domain":"game/combat","statusHistory":[{"from":"draft","to":"active","date":"2026-04-01"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-04-01","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition — Room Grammar implemented and verified"}],"userGuide":"The dungeon's room shapes are not decorative — they signal what's inside.\n\n- **Charnel halls** (long, narrow rooms): high concentration of Elite and Ancient monsters. Move carefully, ensure potions are stocked before entering.\n- **Sanctums** (wide, roughly square rooms): favour Shrines and Chests. Good rooms to detour toward when gear or buffs are needed.\n- **Standard rooms**: normal encounter distribution — the baseline.\n\nThe grammar is deterministic per seed. If you die in a Charnel hall, the same hall will be dangerous on a repeated run with the same seed.","componentFile":"src/engine/grid.ts, src/store/gridStore.ts","npmPackages":[],"publicInterface":[{"name":"RoomType","type":"enum","description":"Standard | Charnel | Sanctum — semantic identity of a BSP room"},{"name":"classifyRooms","type":"(rooms: Room[]) => RoomType[]","description":"Pure function: classifies each room by aspect ratio and area"},{"name":"getRoomTypeAt","type":"(rooms, roomTypes, pos) => RoomType","description":"Returns the room type at a grid position, or Standard if no match"},{"name":"GridState.rooms","type":"Room[]","description":"BSP room list stored in gridStore, set on initFloor"},{"name":"GridState.roomTypes","type":"RoomType[]","description":"Parallel array to rooms[], set on initFloor via classifyRooms"}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"Room classification logic","snippet":"export function classifyRooms(rooms: Room[]): RoomType[] {\n  return rooms.map(r => {\n    const ratio = Math.max(r.w / r.h, r.h / r.w)\n    if (ratio >= 2.5) return RoomType.Charnel\n    if (r.w * r.h >= 30 && ratio < 1.8) return RoomType.Sanctum\n    return RoomType.Standard\n  })\n}"},{"label":"Encounter weight biasing by room type","snippet":"const biasedWeights = roomType === RoomType.Charnel\n  ? { ...baseWeights, elite: baseWeights.elite * 3, ancient: baseWeights.ancient * 2, shrine: 1, chest: 1 }\n  : roomType === RoomType.Sanctum\n  ? { ...baseWeights, shrine: baseWeights.shrine * 5, chest: baseWeights.chest * 4, elite: Math.floor(baseWeights.elite * 0.3) }\n  : baseWeights"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-075","title":"Room visual identity — distinct tile themes per room type","status":"draft","problem":"All room types (combat, chest, shrine, boss, exit) render with the same floor/wall tile colors. Players cannot visually distinguish room types at a glance — the room grammar exists in data but is invisible in the UI. Boss rooms, shrines, and exits should have immediately recognizable visual signatures.","schemaVersion":1,"tags":["grid","dungeon","bsp","encounter","procedural","room-grammar"],"lineage":{"parent":"feat-2026-055","spawnReason":"deferred polish: per-room-type visual theming was explicitly cut from the initial room grammar implementation"},"domain":"game/combat"},{"featureKey":"feat-2026-057","title":"Run Meta Layer — Heatmap, Echo Whisper & Graveyard Study","status":"frozen","problem":"Between runs, the player has no diagnostic feedback (where do I keep dying?), no ambient presence from past runs (Ghost Echo is a silent stat bonus), and no permanent meta-progression beyond XP and stash items. The graveyard is a memorial with no utility beyond echo invocation. Long-term players hit a ceiling where every run feels stateless.","schemaVersion":1,"analysis":"Three independent meta systems targeting different retention gaps. (1) Death Floor Heatmap: players accumulate deaths but have no diagnostic view of where they keep dying. A per-floor death counter exposed as a bar chart closes the feedback loop and makes the Graveyard screen useful between runs, not just post-death. (2) Echo Whisper: Ghost Echo grants 25% stat bonus but is silent — it misses the narrative opportunity of a mentor figure. A one-time whisper per run on floor 1 transforms a passive bonus into a presence. (3) Graveyard Study: every graveyard item is currently either an echo source or dead weight. Study introduces a permanent sacrifice decision — trade echo potential for lasting knowledge — adding a between-run meta layer that compounds across many runs.","decisions":[{"decision":"Graveyard Study is irreversible — studying an entry permanently marks it and prevents echo invocation","rationale":"The value of the study mechanic comes from the decision: echo (temporary floor power) vs. knowledge (permanent record). If study were reversible the choice would have no weight. The sacrifice framing mirrors the graveyard's existing death-penalty philosophy.","alternativesConsidered":["Study as a copy (keep entry + gain bonus) — removes the tension entirely"],"date":"2026-04-01"},{"decision":"Study bonuses are flavor-only in v1 — descriptions shown in Graveyard, no mechanical effect","rationale":"Mechanical effects (e.g. extended fog radius, auto-identification) require changes across multiple engine files and need balance testing. Shipping flavor bonuses first validates the core decision mechanic without risking balance. Effects can be layered in v2 once the careerStats.studiedBonuses[] array is populated with real player data.","alternativesConsidered":["Ship 1-2 mechanical bonuses with flavor — increases scope and bug surface in a pre-App Store window"],"date":"2026-04-01"},{"decision":"Echo Whisper fires once per run, on floor 1 only, with a 2.5s delay","rationale":"Firing on floor 1 gives the whisper context — the player just invoked the echo and is about to explore. The 2.5s delay ensures the player has settled into the grid view before the text appears. Once-per-run prevents the whisper from becoming intrusive noise across floors.","alternativesConsidered":["Fire on every floor with echo active — too frequent, loses the 'mentor speaks rarely' atmosphere","Fire immediately on mount — competes with existing mount effects (legend hint, ghost echo hint)"],"date":"2026-04-01"}],"implementation":"gameStore.ts: floorDeaths: number[] added to CareerStats (index = absFloor-1, incremented in endRun on death). echoWhisperShown: boolean added to GameState (reset each startRun), markEchoWhisperShown() action. GraveyardEntry.studied?: boolean field. careerStats.studiedBonuses: string[] (quality key per studied entry). studyGraveyardEntry(uid) action marks entry as studied and appends quality string. GraveyardScreen.tsx: FloorHeatmap component renders 30 bars (red, height proportional to death count, floor labels every 5) above the entry list. EntryCard gains STUDY ✦ button when not studied and not active echo; shows studied bonus description inline after study. GridScreen.tsx: ECHO_WHISPERS lookup table (11 slot-keyed strings). useEffect fires 2.5s after mount when floor===1 && ghostCharm active && !echoWhisperShown — renders purple italic whisper text overlay for 6s.","knownLimitations":["Study bonuses are flavor-only — no mechanical effect shipped in v1","Whisper strings are hardcoded slot-keyed lookup (11 entries) — no dynamic generation from run history","Heatmap only shows up to 30 floors (absoluteFloor 1-30); tiers beyond tier 3 are not visualised"],"tags":["meta","graveyard","retention","ghost-echo","progression","analytics"],"annotations":[],"lineage":{"parent":"feat-2026-036","children":["feat-2026-076"],"spawnReason":"scope split: persistent meta systems orthogonal to core death/graveyard loop — three new between-run layers"},"successCriteria":"Death heatmap renders in GraveyardScreen after first death, correctly shows floor index for each bar. Echo whisper appears on floor 1 when ghost echo active, does not repeat within the same run. Study button appears on unstudied entries, marks them permanently after tap, shows quality-keyed description. TypeScript 0 errors. No regressions in graveyard or GridScreen behaviour.","domain":"progression","statusHistory":[{"from":"draft","to":"active","date":"2026-04-01"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-04-01","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition — Run Meta Layer implemented and verified"}],"userGuide":"## Death Floor Heatmap\nThe Graveyard screen now shows a bar chart of your deaths across all 30 dungeon floors. Taller red bars mean you die there most. Use it to identify your danger zone and change strategy for those floors.\n\n## Echo Whisper\nWhen Ghost Echo is active on floor 1 of a run, the echo speaks once — a short italic line from the character whose item you carry. It appears 2-3 seconds after you enter the dungeon and fades after 6 seconds. Each item slot has a different whisper.\n\n## Graveyard Study\nEvery item in the graveyard has two uses: **Invoke Echo** (temporary power for one floor) or **Study** (permanent knowledge). Studying consumes the item — it can no longer be echoed — and unlocks a permanent insight shown in the Graveyard screen. Study bonuses are quality-keyed: studying a Unique unlocks different knowledge than studying a Normal.","componentFile":"src/screens/GraveyardScreen.tsx, src/screens/GridScreen.tsx, src/store/gameStore.ts","npmPackages":[],"publicInterface":[{"name":"CareerStats.floorDeaths","type":"number[]","description":"Indexed by absFloor-1; incremented on death in endRun"},{"name":"CareerStats.studiedBonuses","type":"string[]","description":"Quality IDs of studied graveyard entries — currently flavor, future gate"},{"name":"GraveyardEntry.studied","type":"boolean (optional)","description":"True after studyGraveyardEntry is called for this entry"},{"name":"studyGraveyardEntry","type":"(uid: string) => void","description":"Marks entry as studied and appends quality id to careerStats.studiedBonuses"},{"name":"FloorHeatmap","type":"React component","description":"30-bar chart of floorDeaths[], shown in GraveyardScreen above entry list"},{"name":"STUDY_BONUS_DESC","type":"Record<string, string>","description":"Quality-keyed flavor descriptions of knowledge gained by studying an item"}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"Death heatmap bar chart (30 floors)","snippet":"function FloorHeatmap({ floorDeaths }: { floorDeaths: number[] }) {\n  const maxDeaths = Math.max(...floorDeaths.filter(Boolean), 1)\n  const bars = Array.from({ length: 30 }, (_, i) => floorDeaths[i] ?? 0)\n  return (\n    <View style={hmStyles.chart}>\n      {bars.map((count, i) => (\n        <View key={i} style={hmStyles.barCol}>\n          <View style={[hmStyles.bar, { height: Math.max(2, (count / maxDeaths) * 28), opacity: count > 0 ? 0.8 : 0.12 }]} />\n          {(i + 1) % 5 === 0 && <Text style={hmStyles.floorLabel}>{i + 1}</Text>}\n        </View>\n      ))}\n    </View>\n  )\n}"},{"label":"studyGraveyardEntry action in gameStore","snippet":"studyGraveyardEntry: (uid) => set(s => ({\n  graveyard: s.graveyard.map(e => e.item.uid === uid ? { ...e, studied: true } : e),\n  careerStats: {\n    ...s.careerStats,\n    studiedBonuses: [...(s.careerStats.studiedBonuses ?? []), uid],\n  },\n}))"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-058","title":"Run Stakes — Pre-Run Intent with Bonus Drop","status":"frozen","problem":"Every run starts with no declared intention beyond class selection. Players in short sessions (10–15 min) have no micro-goal to anchor the run — only the macro goal of reaching floor 30. Without a session-scoped win condition, a run that ends on floor 4 feels like pure failure even if the player achieved something meaningful.","schemaVersion":1,"analysis":"The session-length problem: a player with 12 minutes has no declared win condition smaller than 'survive to floor 30'. Without a micro-goal, any run ending before that feels like failure. Run Stakes adds a pre-run intent declaration on ClassSelectScreen — the player picks a hunt (SLAYER/SCAVENGER/DEEPDIVER) before descending. On completion, a 35% probability rolls a bonus chest-quality item drop. The stake persists across runs (it's the player's declared style of play), and completion state resets each startRun. The probability gate preserves run variance and avoids the stake feeling like a guaranteed economy loop.","decisions":[{"decision":"activeStake persists across runs — not reset by startRun","rationale":"The stake represents the player's declared hunt style, not a per-run commitment. A player who always wants to slay should not have to re-select every run. stakeClaimed resets each run, so the reward mechanic still triggers once per completion.","date":"2026-04-01"},{"decision":"35% bonus drop probability — not guaranteed","rationale":"A guaranteed drop would make stakes feel like a farming mechanic — players would optimise for the fastest completable stake rather than their preferred playstyle. 35% is frequent enough to feel meaningful but rare enough to stay exciting. The RNG is seeded from (seed ^ constant ^ floor) to maintain run reproducibility.","alternativesConsidered":["100% drop — trivially farmable","10% drop — feels unrewarding, players stop caring about claims"],"date":"2026-04-01"},{"decision":"Stake bonus item delivered directly to bag — no new loot screen","rationale":"Opening a loot screen mid-run for a single item would break the movement flow and require wiring a new loot entry point. Directly calling inventoryStore.addItem() with a toast notification delivers the reward without interrupting the game loop.","alternativesConsidered":["New 'stake loot' screen — higher friction, requires additional state routing"],"date":"2026-04-01"}],"implementation":"gameStore.ts: StakeId type ('slayer'|'scavenger'|'deepdiver'), STAKE_DEFS array (exported), activeStake/stakeClaimed/stakeBonusItem/echoWhisperShown added to GameState. claimStake() uses makeRng(seed^0xd4e5f612^floor) to roll 35% — if hit, calls rollLoot('chest', floor, 50) and stores first item as stakeBonusItem. Stake checks wired into recordKill (slayer threshold 25), recordRunItem (scavenger threshold 10), nextFloor (deepdiver threshold absFloor 5). startRun resets stakeClaimed+stakeBonusItem, leaves activeStake unchanged. ClassSelectScreen: stake picker row (3 chips: ⚔ SLAYER / 📦 SCAVENGER / ↓ DEEPDIVER) above DESCEND button; active chip gold-bordered; hint text shows target and '35% bonus drop on success'. GridScreen: top-right progress badge (e.g. SLAYER 18/25) visible while stake active and unclaimed; '★ STAKE CLAIMED' toast on completion (4s); if bonus item present, adds to bag via inventoryStore.addItem and shows '★ STAKE CLAIMED — bonus item added to bag'.","knownLimitations":["DEEPDIVER progress counter shows absoluteFloor (e.g. tier 2 floor 1 = floor 11) rather than a simple 'reached floor 5 in this run' — could confuse returning players on higher tiers","Stake completion not recorded in careerStats (stakesCompleted counter not yet added)","Bag-full edge case silently drops the bonus item — no fallback to stash or notification"],"tags":["meta","progression","class-select","loot","retention","session-design"],"annotations":[],"lineage":{"parent":"feat-2026-043","children":["feat-2026-077"],"spawnReason":"scope split: pre-run intent layer not covered by class-system — adds hunt declaration + probability-gated reward"},"successCriteria":"Stake picker visible on ClassSelectScreen footer. Progress badge updates in real-time in GridScreen. claimStake fires exactly once per run at the correct threshold for each stake type. Bonus item appears in bag at 35% rate (verifiable over many runs via sim). Toast displays on claim. TypeScript 0 errors.","domain":"game/progression","statusHistory":[{"from":"draft","to":"active","date":"2026-04-01"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-04-01","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition — Run Stakes implemented and verified"}],"userGuide":"## Run Stakes\n\nBefore descending, pick a **Hunt** in the footer below the class cards:\n\n- **⚔ SLAYER** — Kill 25 monsters this run\n- **📦 SCAVENGER** — Pick up 10 items this run  \n- **↓ DEEPDIVER** — Reach floor 5\n\nYour hunt is optional — tap a chip to select, tap again to deselect. Your choice persists between runs.\n\nWhile a stake is active, a small badge in the top-right of the dungeon shows your progress (e.g. `SLAYER 12/25`). When you hit the target, the badge disappears and a `★ STAKE CLAIMED` toast appears. There's a **35% chance** a bonus item drops into your bag at that moment — chest-quality loot scaled to your current floor depth.","componentFile":"src/store/gameStore.ts (StakeId, STAKE_DEFS, claimStake, activeStake, stakeBonusItem), src/screens/ClassSelectScreen.tsx, src/screens/GridScreen.tsx","npmPackages":[],"publicInterface":[{"name":"StakeId","type":"type alias","description":"'slayer' | 'scavenger' | 'deepdiver'"},{"name":"STAKE_DEFS","type":"readonly array","description":"{ id, label, desc, icon, target } — exported from gameStore for UI consumption"},{"name":"GameState.activeStake","type":"StakeId | null","description":"Currently selected stake; persists across startRun"},{"name":"GameState.stakeClaimed","type":"boolean","description":"True once the stake objective was met this run"},{"name":"GameState.stakeBonusItem","type":"Item | null","description":"Set to a loot item when 35% drop triggers on claim; consumed by GridScreen"},{"name":"setStake","type":"(id: StakeId | null) => void","description":"Toggle stake selection from ClassSelectScreen"},{"name":"claimStake","type":"() => void","description":"Called internally when objective is met; 35% chance to set stakeBonusItem"},{"name":"clearStakeBonusItem","type":"() => void","description":"Called by GridScreen after delivering bonus item to inventory"}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"35% bonus drop on stake claim","snippet":"claimStake: () => {\n  const { activeStake, floor, seed } = get()\n  if (!activeStake || get().stakeClaimed) return\n  set({ stakeClaimed: true })\n  const rng = makeRng(seed ^ 0xd4e5f612 ^ (floor * 0x9e3779b9))\n  if (rng() < 0.35) {\n    const item = rollLoot(rng, 'chest', floor, 50)\n    if (item) { set({ stakeBonusItem: item }); return }\n  }\n  scheduleSave()\n}"},{"label":"Stake picker UI in ClassSelectScreen","snippet":"<View style={styles.stakeRow}>\n  <Text style={styles.stakeLabel}>HUNT</Text>\n  {STAKE_DEFS.map(s => (\n    <TouchableOpacity key={s.id}\n      style={[styles.stakeChip, activeStake === s.id && styles.stakeChipActive]}\n      onPress={() => setStake(activeStake === s.id ? null : s.id)}>\n      <Text style={styles.stakeChipIcon}>{s.icon}</Text>\n      <Text style={[styles.stakeChipText, activeStake === s.id && styles.stakeChipTextActive]}>{s.label}</Text>\n    </TouchableOpacity>\n  ))}\n</View>"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-050","title":"Persistent Save / Load — AsyncStorage Serialization","status":"frozen","problem":"All game state (XP, level, class, shared stash, graveyard, town portal scrolls) lives in Zustand in-memory only — it resets to zero every time the app is restarted. Players lose all progress on app close. This makes the game unshippable — no persistent progress means no retention.","schemaVersion":1,"analysis":"All persistent state lives in gameStore (xp, level, classId, playerHp, playerMaxHp, graveyard, sharedStash, mana, maxMana, floor, tier, screen) and inventoryStore (bag, equipped). combatStore has townPortalScrolls which should survive app restarts. @react-native-async-storage/async-storage is included in the Expo SDK. The bag is run-scoped (reset on new run start in ClassSelectScreen) and should NOT be saved. Equipped items are cross-run and should be saved. The save/load cycle is: app launch → read AsyncStorage → hydrate stores → ready. State changes → debounced write to AsyncStorage.","decisions":[{"decision":"Save only cross-run state — bag is NOT saved","rationale":"The bag is run-scoped by design. Saving it would mean a crashed run persists its loot state, which undermines the roguelite death-resets-run contract. Only stash, equipped, xp, level, graveyard, and class survive.","alternativesConsidered":["Save everything including bag — breaks roguelite death loop","Save nothing — already the broken current state"],"date":"2026-03-29"},{"decision":"Single save slot with version field, no multi-slot in v1","rationale":"Multi-slot save requires a save slot selection UI before gameplay. For a solo mobile game in v1, one save slot is sufficient and keeps hydration path simple.","alternativesConsidered":["3 save slots — good for future, unnecessary complexity now"],"date":"2026-03-29"},{"decision":"500ms debounce on persist writes","rationale":"gainXp can be called multiple times per combat (level-up check). Writing to AsyncStorage on every XP tick would cause excessive I/O. 500ms debounce batches a full combat sequence into one write.","alternativesConsidered":["Write on every state change — too frequent","Write only on app backgrounding — risk of loss on crash"],"date":"2026-03-29"}],"implementation":"1. src/services/persistence.ts — SAVE_KEY='@d2game_save_v1', SETTINGS_KEY='@d2game_settings_v1'. SaveData interface: { version:1, xp, level, classId, playerHp, playerMaxHp, mana, maxMana, floor, tier, graveyard, classXp, sharedStash, equipped, equippedByClass?, townPortalScrolls, classesPlayed?, careerStats?: CareerStats (includes tiersCleared: number[] and ascensions: number), bossDefeated? }. SettingsData interface: { hapticsEnabled, audioEnabled, onboardingDone, hasSeenFirstBoss?, zoomLevel?: 0|1|2, hasSeenGhostEchoHint?: boolean }. 2. saveGame(data: SaveData): Promise<void> — JSON.stringify to AsyncStorage. 3. migrate(raw: any): SaveData | null — handles versionless saves, adds defaults for all optional fields including careerStats.tiersCleared and careerStats.ascensions. Returns null if version mismatch after migration. 4. loadGame(): Promise<LoadResult> — returns { save: SaveData, corrupted: false } | { save: null, corrupted: false } | { save: null, corrupted: true }. 5. clearSave(): removes SAVE_KEY from AsyncStorage (settings key survives). 6. saveSettings / loadSettings: separate AsyncStorage key so settings survive a save reset. 7. scheduleSave(): debounced 500ms module-level function — uses require() inside callback to break circular import between persistence ↔ stores. Reads gameStore, inventoryStore, gridStore snapshots; calls saveGame(). Called after any persistent state mutation (gainXp, endRun, depositToStash, withdrawFromStash, equipFromStash, unequipToStash, selectClass, ascendRun, etc.). 8. App.tsx hydration: loadGame() on mount → gameStore.hydrate() + inventoryStore.hydrateEquipped() + combatStore townPortalScrolls. Shows LoadingScreen while !isHydrated. 9. settingsStore.loadFromDisk(): called separately on mount, restores all SettingsData fields.","knownLimitations":["No save migration across schema versions — version field exists, migrate() returns null on version mismatch (save wiped)","No iCloud/backup sync — save lives on device only","If app crashes mid-write, last 500ms of state changes may be lost","scheduleSave() uses require() inside callback to avoid circular module dependency — intentional, not a hot-path issue"],"tags":["persistence","save","load","asyncstorage","infrastructure"],"annotations":[],"lineage":{"parent":"feat-2026-034","children":["feat-2026-072"]},"successCriteria":"Kill app mid-run, reopen — XP, level, class, stash items, graveyard entries, equipped items all restore correctly. Bag is empty on reopen (run-scoped). LoadingScreen shows briefly on cold start. clearSave() called from Settings wipes all data.","domain":"game/persistence","statusHistory":[{"from":"draft","to":"active","date":"2026-03-29"},{"from":"active","to":"frozen","date":"2026-03-29"}],"revisions":[{"date":"2026-03-29","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition for save/load persistence"},{"date":"2026-03-31","author":"claude","fields_changed":["implementation"],"reason":"BMAD session 2: update SaveData (careerStats now includes tiersCleared/ascensions), SettingsData (zoomLevel, hasSeenGhostEchoHint), scheduleSave pattern, migrate() defaults, LoadResult type"}],"userGuide":"Your progress saves automatically. XP, level, class, stash items, equipped gear, and graveyard entries survive app restarts. Your dungeon run (bag items, current floor) does NOT save — quitting mid-run is equivalent to dying. Start a new run from the menu after reopening.","componentFile":"src/services/persistence.ts, src/store/gameStore.ts, src/store/inventoryStore.ts, src/store/combatStore.ts, App.tsx, src/components/LoadingScreen.tsx","npmPackages":["@react-native-async-storage/async-storage"],"publicInterface":[{"name":"saveGame","type":"(data: SaveData) => Promise<void>","description":"Serializes persistent state to AsyncStorage"},{"name":"loadGame","type":"() => Promise<LoadResult>","description":"Reads, migrates, and validates save data from AsyncStorage. Returns LoadResult with corrupted flag."},{"name":"clearSave","type":"() => Promise<void>","description":"Removes main save key from AsyncStorage. Settings key is NOT removed."},{"name":"scheduleSave","type":"() => void","description":"Debounced (500ms) save trigger. Call after any persistent state mutation. Uses require() inside timeout callback to avoid circular imports."},{"name":"SaveData","type":"interface","description":"Versioned save schema including careerStats.tiersCleared: number[] and careerStats.ascensions: number"},{"name":"SettingsData","type":"interface","description":"Settings schema: hapticsEnabled, audioEnabled, onboardingDone, hasSeenFirstBoss, zoomLevel (0|1|2), hasSeenGhostEchoHint"}],"externalDependencies":[],"lastVerifiedDate":"2026-03-31","codeSnippets":[{"label":"SaveData interface (current schema)","snippet":"export interface SaveData {\n  version:           1\n  xp:                number\n  level:             number\n  classId:           ClassId | null\n  playerHp:          number\n  playerMaxHp:       number\n  mana:              number\n  maxMana:           number\n  floor:             number\n  tier:              number\n  graveyard:         GraveyardEntry[]\n  classXp:           Partial<Record<ClassId, { xp: number; level: number }>>\n  sharedStash:       Item[]\n  equipped:          Partial<Record<EquipSlot, Item>>\n  equippedByClass?:  Partial<Record<ClassId, Partial<Record<EquipSlot, Item>>>>\n  townPortalScrolls: number\n  classesPlayed?:    ClassId[]\n  careerStats?:      CareerStats  // includes tiersCleared: number[], ascensions: number\n  bossDefeated?:     boolean\n}"},{"label":"SettingsData interface (current schema)","snippet":"export interface SettingsData {\n  hapticsEnabled:        boolean\n  audioEnabled:          boolean\n  onboardingDone:        boolean\n  hasSeenFirstBoss?:     boolean\n  zoomLevel?:            0 | 1 | 2\n  hasSeenGhostEchoHint?: boolean\n}"},{"label":"migrate() careerStats defaults","snippet":"careerStats: {\n  totalRuns:    raw.careerStats?.totalRuns    ?? 0,\n  deepestTier:  raw.careerStats?.deepestTier  ?? 1,\n  totalKills:   raw.careerStats?.totalKills   ?? 0,\n  bestQuality:  raw.careerStats?.bestQuality  ?? null,\n  tiersCleared: raw.careerStats?.tiersCleared ?? [],\n  ascensions:   raw.careerStats?.ascensions   ?? 0,\n},"},{"label":"scheduleSave — debounced with require() to break circular dep","snippet":"let _saveTimer: ReturnType<typeof setTimeout> | null = null\nexport function scheduleSave(): void {\n  if (_saveTimer) clearTimeout(_saveTimer)\n  _saveTimer = setTimeout(() => {\n    _saveTimer = null\n    try {\n      const { useGameStore }      = require('../store/gameStore')\n      const { useInventoryStore } = require('../store/inventoryStore')\n      const { useGridStore }      = require('../store/gridStore')\n      // ... build SaveData from snapshots ...\n      saveGame(data)\n    } catch (e) { console.warn('[persistence] scheduleSave snapshot failed:', e) }\n  }, 500)\n}"},{"label":"App.tsx hydration on mount","snippet":"const [isHydrated, setIsHydrated] = useState(false)\nuseEffect(() => {\n  loadGame().then(result => {\n    if (result.save) {\n      useGameStore.getState().hydrate(result.save)\n      useInventoryStore.getState().hydrateEquipped(result.save.equipped)\n      useInventoryStore.getState().hydrateEquippedByClass(result.save.equippedByClass ?? {})\n      useCombatStore.setState({ townPortalScrolls: result.save.townPortalScrolls })\n    }\n    setIsHydrated(true)\n  })\n}, [])\nif (!isHydrated) return <LoadingScreen />"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-072","title":"Save schema migration — version-safe upgrades without wipe","status":"draft","problem":"When the save schema changes, the current code wipes the entire save rather than migrating. Any schema evolution (new fields, renamed keys, restructured state) silently destroys player progress. A versioned migration system is required before public release.","schemaVersion":1,"tags":["persistence","save","load","asyncstorage","infrastructure"],"lineage":{"parent":"feat-2026-050","spawnReason":"deferred critical feature: save migration was explicitly deferred from the initial save/load implementation as a pre-release requirement"},"domain":"game/persistence"},{"featureKey":"feat-2026-069","title":"Set items, bow mechanics, and deterministic UID","status":"draft","problem":"Three gaps: (1) Set items (coordinated multi-piece bonuses) are absent — the highest item tier in D2. (2) Bows are in the loot pool but have no ranged attack mechanic; they behave identically to melee weapons. (3) nextUid uses Math.random(), which can theoretically collide and is not seedable for replay/testing.","schemaVersion":1,"tags":["items","loot","runewords","uniques","content"],"lineage":{"parent":"feat-2026-046","spawnReason":"deferred scope + latent bug: set items and bow ranged mechanics were cut from v1; Math.random UID is a correctness risk"},"domain":"game/items"},{"featureKey":"feat-2026-051","title":"Settings Screen","status":"frozen","problem":"There is no settings screen — players cannot toggle haptics, mute future audio, reset their save, or view app version. This is a hard requirement for App Store submission (Apple requires a data/reset option) and for player preference.","schemaVersion":1,"analysis":"No settings system exists. useHaptics.ts (feat-048) needs a hapticsEnabled flag. save/load (feat-050) needs a clearSave() entry point exposed to the user. Apple App Store requires apps to provide a way to reset/delete user data. App version is in app.json and accessible via expo-constants. The settings screen is a lightweight screen with 4 concerns: haptics toggle, audio toggle (placeholder), reset progress, about.","decisions":[{"decision":"Settings persisted via AsyncStorage in persistence.ts (SettingsData interface)","rationale":"Settings are user preferences that must survive app restarts; AsyncStorage is the correct persistence layer for this game.","date":"2026-03-29"},{"decision":"settingsStore exposes individual toggles and markX actions","rationale":"Granular actions are easier to call from UI components than a generic setField action; each action also triggers saveSettings automatically.","date":"2026-03-29"},{"decision":"BMAD S3: hasSeenCodexHint boolean added — tracks whether player dismissed the Codex first-open hint; markCodexHintSeen action; persisted in SettingsData","rationale":"One-time hints should be persisted so they never re-appear after dismissal even across app restarts.","date":"2026-04-01"}],"implementation":"1. src/store/settingsStore.ts — SettingsState: { hapticsEnabled: boolean, audioEnabled: boolean, onboardingDone: boolean, hasSeenFirstBoss: boolean, zoomLevel: 0|1|2, hasSeenGhostEchoHint: boolean, loaded: boolean }. Actions: setHaptics, setAudio, setOnboardingDone, markFirstBossSeen, setZoomLevel(z: 0|1|2), markGhostEchoHintSeen(), loadFromDisk(): Promise<void>. Each mutating action calls saveSettings() with the full SettingsData object (all 6 fields). loadFromDisk() calls loadSettings() and applies defaults for optional fields (zoomLevel ?? 1, hasSeenGhostEchoHint ?? false). 2. src/screens/SettingsScreen.tsx — sections: AUDIO/HAPTICS (toggle rows with Switch), DANGER ZONE (RESET PROGRESS button → Alert.alert confirmation), ABOUT (version from expo-constants). 3. App.tsx — 'settings' in GameScreen type. ⚙ icon on main menu header. 4. SettingsScreen RESET PROGRESS: clearSave() + reset stores to initial state + setScreen('grid'). 5. GridScreen: reads savedZoom = useSettingsStore(s => s.zoomLevel) to initialize zoom state. Calls persistZoom (setZoomLevel) on every zoom change (buttons + pinch). 6. useHaptics.ts reads hapticsEnabled before every haptic call.","knownLimitations":["No per-haptics-event granularity (e.g. can't disable only crit haptics)","Audio toggle has no effect in v1"],"tags":["settings","haptics","persistence","ui","app-store"],"annotations":[{"id":"reopen-1775065879724","author":"lac advance","date":"2026-04-01","type":"reopen","body":"BMAD session 3: added hasSeenCodexHint boolean to settingsStore with markCodexHintSeen() action, persisted to disk via persistence.ts"}],"lineage":{"parent":"feat-2026-034","children":["feat-2026-073"]},"successCriteria":"Haptics toggle disables/enables haptic feedback immediately. Reset progress wipes save and returns to fresh game. App version number visible. Settings survive a save reset. Zoom level persists across app restarts. Ghost Echo hint shows exactly once when graveyard is non-empty.","domain":"game/ui","statusHistory":[{"from":"draft","to":"active","date":"2026-03-29"},{"from":"active","to":"frozen","date":"2026-03-29"},{"from":"frozen","to":"active","date":"2026-04-01","reason":"BMAD session 3: added hasSeenCodexHint boolean to settingsStore with markCodexHintSeen() action, persisted to disk via persistence.ts"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-03-29","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition for settings screen"},{"date":"2026-03-31","author":"claude","fields_changed":["decisions","implementation","successCriteria"],"reason":"BMAD session 2: add zoomLevel persistence, hasSeenGhostEchoHint one-time hint flag, loadFromDisk(), full SettingsState shape, updated decisions and codeSnippets"},{"date":"2026-04-01","author":"claude+marc","fields_changed":["decisions"],"reason":"BMAD session 3 — hasSeenCodexHint one-time hint persistence"}],"userGuide":"Access Settings from the ⚙ button on the main menu.\n\n**Haptics:** Toggle vibration feedback on/off. Takes effect immediately.\n\n**Zoom:** Your preferred grid zoom (small/medium/large) is saved automatically — the dungeon grid opens at your last zoom level after every restart.\n\n**Reset Progress:** Permanently deletes all saved run data (XP, level, stash, graveyard). Your settings (haptics, zoom, tutorial flags) are preserved. Requires confirmation before executing.\n\n**App version** is displayed in the About section.","componentFile":"src/store/settingsStore.ts, src/screens/SettingsScreen.tsx, App.tsx, src/hooks/useHaptics.ts","npmPackages":["expo-constants"],"publicInterface":[{"name":"useSettingsStore","type":"Zustand store","description":"{ hapticsEnabled, audioEnabled, onboardingDone, hasSeenFirstBoss, zoomLevel: 0|1|2, hasSeenGhostEchoHint, loaded } — persisted to @d2game_settings_v1"},{"name":"setZoomLevel","type":"(z: 0|1|2) => void","description":"Updates and persists the player's preferred grid zoom level"},{"name":"markGhostEchoHintSeen","type":"() => void","description":"Marks the one-time Ghost Echo ambient hint as seen; prevents it from showing again"},{"name":"loadFromDisk","type":"() => Promise<void>","description":"Loads SettingsData from AsyncStorage and hydrates all fields with safe defaults"},{"name":"SettingsScreen","type":"React.FC","description":"Haptics toggle, audio toggle, reset progress, about section with version number"}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"settingsStore — full state shape","snippet":"export interface SettingsState {\n  hapticsEnabled:       boolean\n  audioEnabled:         boolean\n  onboardingDone:       boolean\n  hasSeenFirstBoss:     boolean\n  zoomLevel:            0 | 1 | 2\n  hasSeenGhostEchoHint: boolean\n  loaded:               boolean\n  // actions...\n  setZoomLevel:          (z: 0 | 1 | 2) => void\n  markGhostEchoHintSeen: () => void\n  loadFromDisk:          () => Promise<void>\n}"},{"label":"setZoomLevel — mutate + persist","snippet":"setZoomLevel: (z) => {\n  set({ zoomLevel: z })\n  const s = get()\n  saveSettings({ hapticsEnabled: s.hapticsEnabled, audioEnabled: s.audioEnabled,\n    onboardingDone: s.onboardingDone, hasSeenFirstBoss: s.hasSeenFirstBoss,\n    zoomLevel: z, hasSeenGhostEchoHint: s.hasSeenGhostEchoHint })\n},"},{"label":"loadFromDisk — with optional field defaults","snippet":"loadFromDisk: async () => {\n  const data = await loadSettings()\n  if (data) {\n    set({\n      hapticsEnabled:       data.hapticsEnabled,\n      audioEnabled:         data.audioEnabled,\n      onboardingDone:       data.onboardingDone       ?? false,\n      hasSeenFirstBoss:     data.hasSeenFirstBoss     ?? false,\n      zoomLevel:            data.zoomLevel             ?? 1,\n      hasSeenGhostEchoHint: data.hasSeenGhostEchoHint ?? false,\n    })\n  }\n  set({ loaded: true })\n},"},{"label":"GridScreen — zoom initialized from settingsStore","snippet":"const savedZoom = useSettingsStore(s => s.zoomLevel)\nconst persistZoom = useSettingsStore(s => s.setZoomLevel)\nconst [zoom, setZoom] = useState<ZoomLevel>(savedZoom)\n\nfunction zoomIn()  { const z = Math.min(2, zoom + 1) as ZoomLevel; setZoom(z); persistZoom(z) }\nfunction zoomOut() { const z = Math.max(0, zoom - 1) as ZoomLevel; setZoom(z); persistZoom(z) }"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-044","title":"Shared Stash & Town Screen","status":"frozen","problem":"Players pick up items in the dungeon and must immediately decide to keep or drop them — there is no persistent storage that survives across runs. Items found with one class cannot be used by another. Players also have no way to review their character stats or manage equipped gear outside of a run.","schemaVersion":1,"analysis":"inventoryStore has a bag (10×4 grid, 20 slots) and equipped slots — both are run-scoped. gameStore has no cross-run item persistence. Two gaps: (1) no stash that survives deaths, and (2) no UI for equipment management outside combat. The solution is a sharedStash: Item[] in gameStore (persists like xp/level/tier) and a dedicated TownScreen that doubles as character sheet + stash manager. The LootScreen (dungeon) must NOT have a stash button — stashing is a town activity only.","decisions":[{"decision":"Stash is accessible only in town (TownScreen), not from dungeon loot screen","rationale":"Dungeon stashing broke the intended flow: pick up items → manage in town. Keeping stash town-only creates a deliberate de
