cision loop: survive the floor → return to town → deposit keepers → start next run.","alternativesConsidered":["Stash accessible anywhere — removes the town trip incentive","Stash accessible from inventory screen (in-run) — still breaks the intent"],"date":"2026-03-29"},{"decision":"Visiting town from the dungeon requires a Town Portal Scroll (rare consumable) — no scroll, no town","rationale":"A potion cost was too cheap — players have 4 potions per run and would visit town freely. Scrolls are gated by drop luck: you only get them from chests (always) and elite/rare kills (10-20% chance). This makes each town visit a deliberate, rare event rather than a habit. Inspired directly by Diablo 2's Town Portal scroll mechanic.","alternativesConsidered":["Potion cost — too available, doesn't create real scarcity","HP cost (25% max) — always possible, doesn't reward smart play","Town only accessible between floors — too restrictive, blocks emergency use"],"date":"2026-03-29"},{"decision":"TownScreen combines character sheet + stash management in a tabbed UI","rationale":"Players need both views in sequence: see current stats, see what's in stash, decide what to equip. A combined screen reduces navigation friction. Two tabs (EQUIPPED / STASH) keep it scannable.","alternativesConsidered":["Separate CharacterScreen and StashScreen — extra navigation step","Stash as a modal overlay on the main menu"],"date":"2026-03-29"},{"decision":"Equipping from stash displaces the current item back to stash (not to bag)","rationale":"Bag space is limited (20 slots). Stash is the intended storage layer. Sending the displaced item to the bag would fill it up during normal stash management. Stash-to-stash swaps keep the bag free for dungeon pickups.","alternativesConsidered":["Displaced item goes to bag — can overflow bag unintentionally","Must manually unequip before equipping a new stash item"],"date":"2026-03-29"},{"decision":"Shared stash is a flat Item[] in gameStore (Zustand), not a separate store or SQLite","rationale":"The stash is logically global game state (like graveyard, xp, tier). Zustand keeps all persistent state co-located. SQLite is reserved for future full save-slot implementation. A flat array is sufficient for v1 — no size cap enforced.","alternativesConsidered":["inventoryStore: add stash section — confusing with run-scoped bag","Separate stashStore — unnecessary split for co-located persistent state"],"date":"2026-03-29"}],"implementation":"1. gameStore: add sharedStash: Item[], depositToStash(item), withdrawFromStash(uid), equipFromStash(uid), unequipToStash(slot). 2. equipFromStash: moves item from stash to equipped slot; displaced item goes back to stash. 3. unequipToStash: removes from equipped, pushes to stash. 4. src/screens/TownScreen.tsx: two tabs — EQUIPPED (all 10 equip slots with unequip-to-stash button) and STASH(N) (list of stash items with equip-from-stash or bag-withdraw). 5. Header: ← MAP (back to grid/menu), TOWN title, SWITCH CLASS (to ClassSelectScreen). 6. Character card: class dot + name (class color), level badge, stat chips (HP/MP/DMG/DEF/CRIT/SP via buildPlayerStats). 7. App.tsx: screen === 'town' renders TownScreen; excluded from showMainMenu condition. 8. LootScreen: STASH button removed — dungeon loot goes to bag only. 9. combatStore: add townPortalScrolls: number (resets to 0 on run start), gainScroll() action. Scrolls drop from handleVictory: chest=100%, ancient=20%, elite=10%, rare=10%. Max 3 held. 10. GridScreen TOWN button: disabled when townPortalScrolls===0, consumes 1 scroll on press. Shows 📜×N or 'no scroll'. Chest encounter also calls gainScroll(). 11. Main menu TOWN button: navigates to 'town' (free, no scroll cost).","knownLimitations":["No stash size cap in v1 — players can accumulate unlimited items","Stash is Zustand in-memory only — it does not persist to disk between app restarts (future: AsyncStorage/SQLite serialization)","No item sorting or filtering in stash view","Charms and runes in stash must be manually withdrawn to bag (BAG button) — they cannot be directly equipped","Town Portal Scrolls reset to 0 on new run start (refillPotions) — stash management before starting a run must happen from the main menu TOWN button (which is free)"],"tags":["stash","town","character-sheet","inventory","persistence","ui"],"annotations":[],"lineage":{"parent":"feat-2026-034","children":["feat-2026-067"]},"successCriteria":"Items deposited to stash survive a death and a new run start. Equipping from stash moves the item to the correct slot and sends the displaced item back to stash. TownScreen character card shows correct stats for the active class. The TOWN button from the grid and main menu both navigate to TownScreen. LootScreen has no stash option — only TAKE (bag) or leave.","domain":"game/ui","statusHistory":[{"from":"draft","to":"active","date":"2026-03-29"},{"from":"active","to":"frozen","date":"2026-03-29"}],"revisions":[{"date":"2026-03-29","author":"claude","fields_changed":["problem","analysis","implementation","decisions","successCriteria","userGuide","codexEntry","codeSnippets"],"reason":"Initial feature definition — shared stash + TownScreen implemented and wired into app router"}],"userGuide":"## The Shared Stash\n\nThe stash is permanent storage that survives deaths and run resets. Items you deposit stay there until you use them.\n\n**How to access from the dungeon:** You need a **Town Portal Scroll**. The TOWN button shows how many you have (📜×2) or 'no scroll' if empty — it's grayed out and disabled when you have none.\n\n**How to get scrolls:** Chests always drop 1 scroll when opened. Elite enemies have a 10% chance, Rare enemies 10%, Ancient enemies 20%. You can hold up to 3 at a time. Scrolls reset to 0 when you start a new run.\n\n**From the main menu:** Town is always free — manage your stash between runs without spending scrolls.\n\n**Depositing items:** Pick up items in the dungeon (they go to your bag). When you return to town, use the InventoryScreen to manage your bag, then visit Town to deposit keepers to the stash.\n\n**Equipping from stash:**\n1. Open Town → STASH tab\n2. Tap EQUIP on any equippable item — it moves to your equipped slot\n3. If a different item was in that slot, it returns to the stash automatically\n\n**Unequipping to stash:**\n1. Open Town → EQUIPPED tab\n2. Tap STASH on any equipped item — it moves back to the shared stash\n\n**Note:** Charms, runes, and potions in the stash show a BAG button instead of EQUIP. Tap BAG to move them to your bag.\n\n**What the stash does NOT do:** Stash is not accessible during dungeon loot drops — that would bypass the town trip. Pick up items in the dungeon, then manage them in town.\n\n## Character Sheet\n\nThe top card in TownScreen shows your current class, level, and computed stats:\n- **HP**: current max HP including class bonus and level scaling\n- **MP**: max mana for your class and level\n- **DMG**: weapon damage range including all gear bonuses\n- **DEF**: total defense\n- **CRIT**: crit chance including class bonus and gear\n- **SP**: spell power (Sorcerer only — scales with floor depth)","componentFile":"src/store/gameStore.ts, src/screens/TownScreen.tsx, src/screens/StashScreen.tsx, src/screens/LootScreen.tsx, App.tsx","npmPackages":[],"publicInterface":[{"name":"sharedStash","type":"Item[] (gameStore)","description":"Cross-run shared item storage; persists across deaths and floor resets"},{"name":"depositToStash","type":"(item: Item) => void","description":"Add an item to the shared stash"},{"name":"withdrawFromStash","type":"(uid: string) => void","description":"Remove an item from the stash by UID (used when moving to bag or equipping)"},{"name":"equipFromStash","type":"(uid: string) => void","description":"Equip a stash item to its slot; displaced equipped item returns to stash"},{"name":"unequipToStash","type":"(slot: EquipSlot) => void","description":"Remove an equipped item and place it in the stash"},{"name":"TownScreen","type":"React.FC","description":"Character sheet + stash manager. Two tabs: EQUIPPED and STASH(N)."}],"externalDependencies":[],"lastVerifiedDate":"2026-03-29","codeSnippets":[{"label":"Equip from stash — displaced item returns to stash","snippet":"// In gameStore.equipFromStash(uid):\nconst item = sharedStash.find(i => i.uid === uid)\nconst slot = resolveEquipSlot(item) // ring → ring1 or ring2\nconst displaced = equipped[slot]\nconst newStash = sharedStash.filter(i => i.uid !== uid)\nif (displaced) newStash.push(displaced)\ninvStore.setState(s => ({ equipped: { ...s.equipped, [slot]: item } }))\nset({ sharedStash: newStash })"},{"label":"TownScreen tab navigation","snippet":"// Two tabs — EQUIPPED shows all 10 equip slots with STASH button\n// STASH(N) shows sharedStash items with EQUIP or BAG button\nconst [tab, setTab] = useState<'equipped' | 'stash'>('equipped')"},{"label":"Stat display using buildPlayerStats","snippet":"const stats = buildPlayerStats(floor, level, equipped, classId)\n// Renders: HP, MP (from gameStore.maxMana), DMG (range), DEF, CRIT, SP (sorcerer only)"}]},{"featureKey":"feat-2026-065","title":"Skill combos + cooldown animation","status":"draft","problem":"Shadow Step → Backstab combo triggers correctly in the engine but only logs to console — no visual pop, damage number, or combo text appears in the UI. Skill cooldowns have no animation or countdown indicator, making abilities feel unresponsive.","schemaVersion":1,"tags":["combat","skills","mana","progression","level-gate","combatscreen"],"lineage":{"parent":"feat-2026-042","spawnReason":"deferred polish: combo feedback and cooldown visuals were explicitly out of scope in the initial skills implementation"},"domain":"combat"},{"featureKey":"feat-2026-042","title":"Active Combat Skills","status":"frozen","problem":"Combat has exactly one player action: attack. No expression, no build identity beyond stats. Class-specific skills give players a mana-gated second dimension — each class has 4 unique skills unlocked by level, rewarding progression and creating distinct playstyle identities.","schemaVersion":1,"analysis":"CombatScreen has 3 actions: Attack, Potion, Flee. No skills exist. Mana stat exists on items (increases mana pool) but gameStore has no mana tracking. Skills require: a mana pool in gameStore (persistent like HP), a skill definition table (class-tagged), level-gated unlock, and CombatScreen UI slots. The class system (feat-2026-043) determines which skill set each player sees — only their class's 4 skills are available. This replaces the original generic-skills design with a 3×4 class-specific system (12 skills total).","decisions":[{"decision":"Skill system uses a union SkillId type for compile-time exhaustiveness","rationale":"TypeScript exhaustiveness ensures every SkillId is handled in switch statements; adding a new skill without handling it is a compile error.","date":"2026-03-28"},{"decision":"Skills defined in src/data/skills.ts as SkillDef objects with classId, levelRequired, manaCost, description","rationale":"Centralised skill table makes balancing and adding skills straightforward; no logic lives in the data file.","date":"2026-03-28"},{"decision":"Skill execution dispatched through src/engine/skills/*.ts per class","rationale":"Keeps combat engine logic separate from data definitions; each class file is independently testable.","date":"2026-03-28"},{"decision":"StatusCounters tracks per-round buff durations and cooldowns in combatStore","rationale":"Buff durations and cooldowns are round-scoped state — owned by combatStore alongside the round counter so they tick in sync.","date":"2026-03-28"},{"decision":"BMAD S3: spark added as sorcerer L0 offensive — 1x lightning spell power, 8 mana, fills 3x2 grid","rationale":"Sorcerer had 5 skills leaving a null placeholder in the grid. Spark fills it and gives sorcerer an offensive starter that makes the opening floor viable before fireball.","date":"2026-04-01"},{"decision":"BMAD S3: iron_skin and smoke_bomb given cooldownRounds:3 — prevents back-to-back defensive cycling","rationale":"Without cooldowns, a player could loop iron_skin/smoke_bomb every round indefinitely, removing all risk from combat.","date":"2026-04-01"},{"decision":"BMAD S3: cooldown coexists with buff window — 2-round buff, 3-round cooldown = 1 dead round after buff expires","rationale":"Cooldown is longer than buff so there is always a gap, but not so long that defensive skills feel unavailable.","date":"2026-04-01"},{"decision":"BMAD S3: whirlwind mana cost reduced 28 to 18","rationale":"28 mana blocked early warrior use of their signature skill — 18 makes it available earlier without being free.","date":"2026-04-01"},{"decision":"BMAD S3: meditate reworked to mana-only — initial +30 on cast plus 30/round for 2 rounds = 90 total, no HP heal","rationale":"Meditate was doing both HP and mana, making it a dominant skill with no trade-off. Mana-only creates a clear sorcerer resource management identity.","date":"2026-04-01"},{"decision":"BMAD S3: shadow_step to backstab combo tracked via lastSkillUsed in CombatState, logs SHADOW CRIT at crit type (visual only for now)","rationale":"Establishes the combo infrastructure and visual feedback; mechanical damage bonus deferred until balance is validated.","date":"2026-04-01"},{"decision":"Balance pass: Spark gets spellVarianceFlat:12 — rolls spellPower to spellPower+12 instead of flat spellPower","rationale":"Simulation showed Spark dealt 8 DPS at floor 1 vs basic attack's 12.1, making it a mana-wasting downgrade. Adding 0–12 flat bonus lifts the floor-1 average to ~14, making Spark viable from turn 1 while naturally scaling less at deep floors where spellPower dominates anyway.","date":"2026-04-01"},{"decision":"Balance pass: Whirlwind second hit is now guaranteed (removed !isMiss guard)","rationale":"Old Whirlwind only triggered the second hit if the first landed, making it strictly worse than Power Strike in expected DPS (45.6 vs 50.6) at higher mana cost (18 vs 12). After fix, both deal ~equal DPS (~51), making Whirlwind the 'burst ceiling' choice when mana is plentiful vs Power Strike's mana-efficiency role. Both skills now have a clear identity.","date":"2026-04-01"},{"decision":"Balance pass: Rapid Strike gets bonusHitChance:30 — 30% chance to trigger a 4th hit at 70% damage","rationale":"Rapid Strike had no situation where it beat Backstab. Adding a 30% proc for a 4th hit gives Rapid Strike a burst ceiling (280% vs Backstab's guaranteed 300%) and a high-variance identity. The proc adds ~10% average damage, keeping Backstab the reliable mana-efficient choice while Rapid Strike becomes the 'lucky spike' option vs high-HP targets.","date":"2026-04-01"}],"implementation":"1. gameStore: add mana/maxMana (class-specific scaling). 2. src/data/skills.ts: 13 SkillDefs tagged with classId, levelRequired, manaCost, description. 3. Warrior: power_strike (L1, 12mp, 2×dmg), battle_cry (L5, 15mp, -35% dmg 2rds), iron_skin (L8, 0mp, +30 def 2rds, monster attacks), whirlwind (L12, 28mp, attack twice). 4. Rogue: backstab (L1, 10mp, 3× crit guaranteed), shadow_step (L5, 10mp, monster cannot retaliate), rapid_strike (L8, 14mp, 3×70% hits), smoke_bomb (L12, 0mp, enemy hit -50% 2rds). 5. Sorcerer: fireball (L0, 28mp, 3× spellPower fire), meditate (L0, 0mp, 15HP+12mana/turn 3 turns, monster attacks), ice_blast (L6, 20mp, 2.5× spellPower cold, halves enemy hit), chain_lightning (L10, 25mp, 2× spellPower lightning, pierces resistance), mana_shield (L14, 0mp, absorb 50% dmg as mana 2rds). 6. combatStore: attackAction/skillAction/handleVictory all use deterministic RNG: makeRng(seed ^ (floor * 0x9e3779b9) ^ (roundNumber * 0x6b429177) ^ offset) — seed from useGameStore.getState().seed. No Date.now() in combat. 7. POST_COMBAT_RECOVERY = 0.10; handleVictory emits le('✦ You catch your breath — +X HP', 'heal') after every victory. 8. refillPotions() clears consumables then adds 3 generateHpPotion() + 1 generateManaPotion() — was previously only clearing without re-adding. 9. CombatScreen skill section: fixed grid layout. classSkills divided into rows of 2 (Math.ceil(classSkills.length / 2) rows). Null slots rendered as transparent 'skillBtnEmpty' placeholders to preserve grid shape. Warrior/rogue = 2×2, sorcerer = 3×2 (with 1 empty). skillGlyph fontSize: 24px (up from 14px). 10. Potion buttons show 'none' sub-label (potionEmptyNote style) when count === 0 in addition to the existing opacity:0.35 disabled state. 11. LevelUpOverlay.tsx: new nextSkill?: SkillDef | null prop. When newSkill is null but nextSkill is set, renders a dimmed 'NEXT SKILL' card showing name, description, and 'unlocks at level N'. CombatScreen tracks two states: levelUpSkill (unlocked now) and levelUpNextSkill (SKILLS.filter(classId, levelRequired > level).sort().at(0)). HUD mana bar in blue.","knownLimitations":["Shadow Step→Backstab combo is log-only — no actual damage amplification implemented yet","Cooldown UI shows CD:N in skill meta but no countdown animation","Skill unlock requires level check but no UI indicator of what unlocks at what level"],"tags":["combat","skills","mana","progression","level-gate","combatscreen"],"annotations":[{"id":"reopen-1775065869357","author":"lac advance","date":"2026-04-01","type":"reopen","body":"BMAD session 3: added spark skill (sorcerer L0), iron_skin/smoke_bomb 3-round cooldowns, whirlwind mana 28→18, meditate reworked to mana-only (30+30+30=90), shadow_step→backstab combo log"}],"lineage":{"children":["feat-2026-065"]},"successCriteria":"Each class sees only its own skills in CombatScreen. Power Strike deals 2× damage; Backstab always crits at 3× multiplier; Fireball deals fire damage scaling with spellPower. Meditate restores HP+mana while monster attacks. Iron Skin and Smoke Bomb are 0-cost defensive skills. Skill buttons greyed when mana insufficient or level below requirement. HUD mana bar updates in real time. Mana persists across floors. Level-up overlay shows next upcoming skill (name, level, description) when no skill unlocks at current level. Skill grid is fixed 2×2 (warrior/rogue) or 2×3 (sorcerer) with transparent locked-skill placeholders maintaining grid shape. Skill glyph is 24px. Potion buttons display 'none' sub-label when count is 0. Post-combat recovery is 10% with a '✦ You catch your breath' heal log line. Combat RNG is deterministic: identical seed/floor/round produces identical outcomes. refillPotions correctly adds 3 HP potions + 1 mana potion after clearing.","domain":"combat","statusHistory":[{"from":"draft","to":"active","date":"2026-03-28"},{"from":"active","to":"frozen","date":"2026-03-28"},{"from":"frozen","to":"active","date":"2026-04-01","reason":"BMAD session 3: added spark skill (sorcerer L0), iron_skin/smoke_bomb 3-round cooldowns, whirlwind mana 28→18, meditate reworked to mana-only (30+30+30=90), shadow_step→backstab combo log"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-03-28","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial fill from design session"},{"date":"2026-03-28","author":"claude","fields_changed":["decisions"],"reason":"Fix decisions schema"},{"date":"2026-03-31","author":"claude","fields_changed":["decisions","implementation","successCriteria"],"reason":"BMAD session 2 improvements: fixed skill grid (2×2/2×3), 24px glyph, next-skill level-up preview, deterministic combat RNG, 10% post-combat recovery with log line, refillPotions fix"},{"date":"2026-04-01","author":"claude+marc","fields_changed":["decisions"],"reason":"BMAD session 3 — spark, cooldowns, meditate rework, whirlwind cost, shadow combo"},{"date":"2026-04-01","author":"claude+marc","fields_changed":["decisions","codeSnippets","userGuide","codexEntry"],"reason":"Balance pass S4 — Spark spellVarianceFlat:12 (8–20 floor-1 range), Whirlwind guaranteed 2nd hit, Rapid Strike bonusHitChance:30 (30% 4th-hit proc). 205 balance tests green."}],"userGuide":"Skills are class-specific and unlock as you level up. Only your class's skills appear in combat — arranged in a fixed grid so you can always see what is locked and what is coming.\n\n**Warrior (2×2 grid):** Power Strike (L1, 12mp) — doubles your damage, most mana-efficient offensive skill. Battle Cry (L5, 15mp) — take 35% less damage for 2 rounds. Iron Skin (L8, free) — +30 defense for 2 rounds, but monster still attacks. Whirlwind (L12, 18mp) — attack twice, second hit always connects regardless of whether the first hit landed.\n\n**Rogue (2×2 grid):** Backstab (L1, 10mp) — guaranteed crit at 3× multiplier, most reliable burst. Shadow Step (L5, 10mp) — monster cannot retaliate this round. Rapid Strike (L8, 14mp) — 3 hits at 70% damage each, with a 30% chance to trigger a 4th hit for high-variance burst. Smoke Bomb (L12, free) — enemy hit chance -50% for 2 rounds.\n\n**Sorcerer (3×2 grid):** Spark (L0, 8mp) — 1× spell power as lightning plus a 0–12 burst bonus (floor 1: 8–20 damage), viable from the very first floor. Fireball (L0, 28mp) — 3× spell power as fire damage, big burst but mana-heavy. Meditate (L0, free) — restores 30 mana on cast plus 30/turn for 2 more turns, monster still attacks. Ice Blast (L6, 20mp) — 2.5× spell power cold, halves enemy hit chance same round. Chain Lightning (L10, 25mp) — 2× spell power lightning, fully bypasses resistance. Mana Shield (L14, free) — absorb 50% incoming damage as mana for 2 rounds.\n\nSorcerer spell power = floor×8 + level×1. Spark is your mana-efficient filler; save Fireball for high-HP targets. When mana is tight, Spark deals comparable DPS/mana to Ice Blast and beats Fireball's efficiency.\n\nMana persists across floors (+10 per floor, +15 per tier clear). Manage it carefully — running dry mid-floor leaves you with basic attacks only.\n\nAfter leveling up, if no skill unlocks at your new level the overlay previews your next upcoming skill — name, description, and unlock level — so you always know what to work toward.\n\nAfter each combat victory you automatically recover 10% of max HP ('✦ You catch your breath'). Potion buttons show 'none' when your bag is empty.","componentFile":"src/data/skills.ts","npmPackages":[],"publicInterface":[{"name":"SKILLS","type":"SkillDef[]","description":"Array of 13 skill definitions, each tagged with classId. Use getSkillsForClass(classId) to get a player's available skills."},{"name":"SkillDef","type":"TypeScript interface","description":"{ id, name, classId, levelRequired, manaCost, description }"},{"name":"getSkillsForClass","type":"(classId: ClassId) => SkillDef[]","description":"Returns only the skills for the given class, in unlock order"},{"name":"mana / maxMana","type":"number (gameStore)","description":"Current and max mana pool, persists across floors, shown in HUD. maxMana = classDef.baseMana + level × classDef.manaPerLevel."}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"Warrior skills","snippet":"// power_strike (L1, 12mp): 2× dmg — mana-efficient burst\n// battle_cry   (L5, 15mp): -35% dmg taken 2 rounds\n// iron_skin    (L8,  0mp): +30 def 2 rounds, monster still attacks\n// whirlwind    (L12, 18mp): attack twice — second hit always connects"},{"label":"Rogue skills","snippet":"// backstab     (L1, 10mp): guaranteed crit at 3× multiplier — reliable burst\n// shadow_step  (L5, 10mp): monster cannot retaliate this round\n// rapid_strike (L8, 14mp): 3 hits at 70%, 30% chance for a 4th hit — high-variance burst\n// smoke_bomb   (L12, 0mp): enemy hit chance -50% for 2 rounds"},{"label":"Sorcerer skills","snippet":"// spark          (L0,   8mp): 1× spellPower lightning + 0–12 burst bonus (floor 1: 8–20 dmg)\n// fireball       (L0,  28mp): 3× spellPower as fire damage\n// meditate       (L0,   0mp): restore 30 mana on cast + 30/turn × 2 turns, monster attacks\n// ice_blast      (L6,  20mp): 2.5× spellPower cold, enemy hit -50% 1 round\n// chain_lightning(L10, 25mp): 2× spellPower lightning, fully pierces resistance\n// mana_shield    (L14,  0mp): absorb 50% incoming dmg as mana for 2 rounds"},{"label":"Fixed skill grid — 2×2 (warrior/rogue) or 2×3 (sorcerer)","snippet":"const cols = 2\nconst rows = Math.ceil(classSkills.length / cols)\nconst slots = [...classSkills]\nwhile (slots.length < rows * cols) slots.push(null)\nconst grid = []\nfor (let r = 0; r < rows; r++) grid.push(slots.slice(r * cols, r * cols + cols))\n// null slots render as transparent skillBtnEmpty placeholders"},{"label":"Next-skill preview in level-up overlay","snippet":"const unlocked = SKILLS.find(s => s.classId === classId && s.levelRequired === level) ?? null\nconst nextUpcoming = !unlocked\n  ? SKILLS.filter(s => s.classId === classId && s.levelRequired > level)\n      .sort((a, b) => a.levelRequired - b.levelRequired)[0] ?? null\n  : null\nsetLevelUpSkill(unlocked)\nsetLevelUpNextSkill(nextUpcoming)"},{"label":"Deterministic combat RNG","snippet":"// attackAction\nconst seed = useGameStore.getState().seed\nconst rng  = makeRng(seed ^ (floor * 0x9e3779b9) ^ (roundNumber * 0x6b429177))\n// skillAction\nconst rng  = makeRng(seed ^ (floor * 0x9e3779b9) ^ (roundNumber * 0x6b429177) ^ 0x77)\n// handleVictory lootRng\nconst rng  = makeRng(seed ^ (floor * 0x9e3779b9) ^ (roundNumber * 0x6b429177) ^ 0x31337)"},{"label":"Post-combat recovery at 10%","snippet":"const POST_COMBAT_RECOVERY = 0.10\nconst recoveryAmt = Math.round(playerMaxHp * POST_COMBAT_RECOVERY)\nconst recoveredHp = Math.min(playerMaxHp, playerHp + recoveryAmt)\nif (recoveryAmt > 0) victoryLog.push(le(`✦ You catch your breath — +${recoveryAmt} HP`, 'heal'))"},{"label":"refillPotions — clear then restock","snippet":"refillPotions: () => {\n  const inv = useInventoryStore.getState()\n  for (const item of Object.values(inv.bag.items)) {\n    if (['hp_potion','mana_potion','town_portal_scroll'].includes(item.baseId))\n      inv.dropItem(item.uid)\n  }\n  inv.addItem(generateHpPotion())\n  inv.addItem(generateHpPotion())\n  inv.addItem(generateHpPotion())\n  inv.addItem(generateManaPotion())\n}"},{"label":"Class-specific maxMana formula","snippet":"// Warrior:  20 + level×4   (L10 = 60)\n// Rogue:    35 + level×6   (L10 = 95)\n// Sorcerer: 60 + level×6   (L10 = 120)\nconst maxMana = classDef.baseMana + level * classDef.manaPerLevel"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-077","title":"Run stakes — completion tracking in careerStats + bag-full feedback","status":"draft","problem":"Two gaps: (1) Stake completions are never recorded in careerStats, so there is no history of which stakes were completed and no basis for future meta-unlocks tied to stake achievements. (2) When the bag is full and a stake bonus item would drop, it is silently discarded — the player gets no notification and may not realize they missed a reward.","schemaVersion":1,"tags":["meta","progression","class-select","loot","retention","session-design"],"lineage":{"parent":"feat-2026-058","spawnReason":"bug + deferred tracking: silent bag-full drop is a UX bug; careerStats tracking was omitted from the initial stakes implementation"},"domain":"game/progression"},{"featureKey":"feat-2026-067","title":"Stash persistence to disk + size cap","status":"draft","problem":"The shared stash lives only in Zustand memory and is wiped on app restart. There is no size limit — the stash can grow unboundedly, which will cause performance issues and makes it feel undesigned. Both issues must be solved together since adding a cap without persistence creates frustrating item loss.","schemaVersion":1,"tags":["stash","town","character-sheet","inventory","persistence","ui"],"lineage":{"parent":"feat-2026-044","spawnReason":"bug + deferred mechanic: stash data loss on restart is a bug; stash cap was a known omission from the initial implementation"},"domain":"game/ui"},{"featureKey":"feat-2026-076","title":"Study bonuses — functional implementation (not flavor text)","status":"draft","problem":"The \"Study\" action in the Graveyard shows a permanent knowledge bonus description per item quality, but none of these bonuses are actually applied in game logic. Studying an item consumes it for flavor text only. The bonus system needs to be wired into the relevant systems (loot display, identification, etc.).","schemaVersion":1,"tags":["meta","graveyard","retention","ghost-echo","progression","analytics"],"lineage":{"parent":"feat-2026-057","spawnReason":"deferred mechanic: study bonuses were deliberately stubbed as flavor text pending integration with loot and identification systems"},"domain":"progression"},{"featureKey":"feat-2026-062","title":"Tier identity — per-tier monster pools and visual themes","status":"draft","problem":"All tiers share the same monster pool and floor palette. Tiers feel identical past tier 1. There is no visual theme differentiation (e.g. dungeon → crypt → hell) and no tier-exclusive monsters to signal escalating danger.","schemaVersion":1,"tags":["progression","difficulty","tiers","scaling","endgame","gamestore"],"lineage":{"parent":"feat-2026-038","spawnReason":"deferred scope: tier theming and monster pool segmentation were explicitly cut from the initial implementation"},"domain":"progression"},{"featureKey":"feat-2026-049","title":"UI Polish Phase 2 — Visual Hierarchy & Screen Consistency","status":"frozen","problem":"Every screen was built independently and lacks visual cohesion — font scales, spacing, and color usage are inconsistent. The main menu has no dungeon atmosphere. Combat log is plain monochrome text. The grid dungeon tiles are grey boxes. Item cards show no rarity color in the grid. There are no screen transitions — cuts are jarring. The overall aesthetic doesn't match the dark fantasy tone of a Diablo-inspired game.","schemaVersion":1,"analysis":"All screens share #0a0a0a background but use locally-defined styles with inconsistent spacing (padding ranges from 14 to 20), mixed font sizes (10-22px in ad-hoc increments), and no shared color constants. GridScreen tiles are plain grey TouchableOpacity boxes with no visual distinction by tile type. CombatScreen monster name is always #e74c3c red regardless of type. TetrisGrid renders items as colored squares with no rarity border. Main menu is 3 plain buttons. No screen transitions between any screens.","decisions":[{"decision":"Visual polish pass 2 targets InventoryScreen, CombatScreen, GridScreen consistency","rationale":"These three screens are the most frequently visited; consistency here has the highest player impact.","date":"2026-03-29"},{"decision":"BMAD S3: MF (magic find) stat line added to InventoryScreen between vitals and skills strip — shows LVL N and MF N% in gold","rationale":"Magic find is an invisible stat that drives loot decisions; surfacing it in the inventory gives players actionable build feedback.","date":"2026-04-01"},{"decision":"BMAD S3: DPad center converted from non-interactive View to TouchableOpacity with onLongPress (400ms) — accepts onWait prop","rationale":"Long-press is a discoverable interaction pattern that avoids cluttering the grid UI with an explicit wait button.","date":"2026-04-01"},{"decision":"BMAD S3: potion heal in InventoryScreen reads effectiveStats.heal (floor-scaled) instead of hardcoded 30 — both handleBagEquip and handleSheetUse updated","rationale":"Floor-scaled potions were implemented in loot.ts but InventoryScreen was still applying a flat 30 HP heal, breaking the floor scaling.","date":"2026-04-01"}],"implementation":"1. src/theme.ts — export COLORS (bg, surface, border, text primary/secondary/dim, quality colors, class colors), FONT (xs=9, sm=11, md=13, lg=16, xl=20, xxl=26), SPACING (xs=4, sm=8, md=14, lg=20, xl=28). Used as import in all screens for consistency. 2. GridScreen.tsx — tile visual overhaul: unexplored tiles show unicode stone chars ('▓','░','▒') in dark grey. Boss tile: red border + skull emoji. Chest tile: yellow border + chest emoji. Exit tile: green border + ↓ arrow. Fog of war: tiles beyond 2 steps from player position render at 30% opacity. Floor + tier header badge: top bar showing 'FLOOR 7 · TIER II' in proper typography. 3. CombatScreen.tsx — monster name color varies by type: Normal=#999, Elite=#3498db, Rare=#c8a020, Ancient=#e74c3c, Boss=#ff0000 + pulsing border. Boss header adds ☠ skull before name + 'BOSS' badge. Combat log lines: 4 most recent shown, older fade to near-invisible. 4. App.tsx MainMenu — title 'DUNGEON DEPTHS' with letter-spacing:8, subtitle 'A DIABLO-STYLE ROGUELITE', animated border pulse on the card. Class dot indicator: shows current classId color if a class is active. 5. LootScreen.tsx — item cards get quality-colored left border (2px). Rare/unique items get a subtle animated shimmer (Animated opacity oscillation 0.7→1 loop). 6. TetrisGrid (ItemCard) — potion items show 🧪 or 💧 centered in their 1×1 cell instead of a plain color block. Rune items show their rune initial (El, Eld...) in gold. 7. Screen transitions — add a shared useFadeTransition hook: Animated.Value opacity 0→1 on mount over 180ms. Apply to all screen root Views. 8. EquipmentPanel.tsx — slot labels are more descriptive, empty slots show a faint icon hint (⚔ for weapon, 🛡 for offhand etc).","knownLimitations":["DPad long-press wait triggers haptic only — no game-state turn-skip mechanic yet"],"tags":["ui","polish","theme","visual","grid","accessibility"],"annotations":[{"id":"reopen-1775065881944","author":"lac advance","date":"2026-04-01","type":"reopen","body":"BMAD session 3: MF stat line in InventoryScreen (LVL + MF%), DPad center converted to TouchableOpacity with 400ms long-press onWait, floor-scaled potion heal reads effectiveStats.heal"}],"lineage":{"parent":"feat-2026-034"},"successCriteria":"All screens use theme.ts constants. Grid tiles are visually distinct by type. Monster names are color-coded by encounter type. Main menu has atmospheric title treatment. Potion/rune items show icons in inventory grid. Screen fades on transition.","domain":"game/ui","statusHistory":[{"from":"draft","to":"active","date":"2026-03-29"},{"from":"active","to":"frozen","date":"2026-03-29"},{"from":"frozen","to":"active","date":"2026-04-01","reason":"BMAD session 3: MF stat line in InventoryScreen (LVL + MF%), DPad center converted to TouchableOpacity with 400ms long-press onWait, floor-scaled potion heal reads effectiveStats.heal"},{"from":"active","to":"frozen","date":"2026-04-01"}],"revisions":[{"date":"2026-03-29","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition for UI polish phase 2"},{"date":"2026-04-01","author":"claude+marc","fields_changed":["decisions"],"reason":"BMAD session 3 — MF stat line, DPad wait, floor-scaled potion heal"}],"userGuide":"UI polish is transparent — the game simply looks better. Tiles show their type at a glance. Monster names are color-coded. Items shimmer by rarity. The dungeon feels dark and atmospheric.","componentFile":"src/theme.ts, src/screens/GridScreen.tsx, src/screens/CombatScreen.tsx, App.tsx, src/screens/LootScreen.tsx, src/components/TetrisGrid.tsx, src/components/EquipmentPanel.tsx","npmPackages":[],"publicInterface":[{"name":"COLORS","type":"Record<string, string>","description":"Centralized color palette from src/theme.ts"},{"name":"FONT","type":"Record<string, number>","description":"Font size scale from src/theme.ts"},{"name":"SPACING","type":"Record<string, number>","description":"Spacing scale from src/theme.ts"}],"externalDependencies":[],"lastVerifiedDate":"2026-04-01","codeSnippets":[{"label":"src/theme.ts — color and font constants","snippet":"export const COLORS = {\n  bg:         '#0a0a0a',\n  surface:    '#0f0f0f',\n  border:     '#1e1e1e',\n  text:       '#cccccc',\n  textDim:    '#555555',\n  gold:       '#c8a020',\n  red:        '#e74c3c',\n  green:      '#2ecc71',\n  blue:       '#5b8fff',\n  purple:     '#9b59b6',\n  quality: { normal: '#888', magic: '#5b8fff', rare: '#c8a020', unique: '#ff8c00' },\n  class:   { warrior: '#e74c3c', rogue: '#2ecc71', sorcerer: '#5b8fff' },\n  encounter: { Normal: '#999', Elite: '#3498db', Rare: '#c8a020', Ancient: '#e74c3c', Boss: '#ff0000' },\n}\nexport const FONT = { xs: 9, sm: 11, md: 13, lg: 16, xl: 20, xxl: 26 }\nexport const SPACING = { xs: 4, sm: 8, md: 14, lg: 20, xl: 28 }"},{"label":"Color-coded combat log line","snippet":"function logLineColor(line: string): string {\n  if (/crit|CRIT/.test(line))           return '#f39c12'\n  if (/Victory|XP|LEVEL UP/.test(line)) return '#2ecc71'\n  if (/damage|dealt/.test(line))        return '#e74c3c'\n  if (/healed|Potion/.test(line))       return '#27ae60'\n  if (/Scroll/.test(line))              return '#9b59b6'\n  return '#555'\n}"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-037","title":"XP & Persistent Leveling","status":"frozen","problem":"Player power comes entirely from gear drops with no intrinsic growth. XP and levels would give a persistent power-creep layer that survives death — acting like an extra equipment slot that scales up indefinitely.","schemaVersion":1,"analysis":"MonsterDef already has baseXp field. combatStore resolves kills but discards XP. buildPlayerStats in combatStore computes stats from floor only — no player level input. gameStore has no xp/level fields. Level needs to persist across deaths (same as gear) to serve as the intended long-term power-creep layer. Level bonuses must feed into buildPlayerStats so the entire combat system respects them.","decisions":[{"decision":"XP and level persist across deaths, never reset","rationale":"Level is the intended long-term power-creep layer that survives death. Resetting level on death would make it indistinguishable from a floor-based stat.","alternativesConsidered":["Level resets on death like floor progress","Partial XP loss on death (Dark Souls style)"],"date":"2026-03-28"},{"decision":"Level curve: total XP for level N = N*(N+1)/2 * 100","rationale":"Triangular number curve naturally slows progression without a hard cap. Level 10 costs 5500 XP total, level 20 costs 21000 — meaningful grind without being infinite.","alternativesConsidered":["Flat 500 XP per level","Exponential doubling curve"],"date":"2026-03-28"},{"decision":"Auto-distribute stat bonuses per level, no manual allocation in v1","rationale":"Keeps UI simple. Manual allocation is a future feature that can be layered on the same XP system without breaking changes.","alternativesConsidered":["Manual point allocation screen on level-up","Choose one of three random bonuses on level-up"],"date":"2026-03-28"},{"decision":"Bonuses: +5 maxHp/level, +1 damage/level, +1 defense/level, +2% critChance every 5 levels","rationale":"Roughly matches what a good Magic item gives per level. Player feels like they are always getting stronger but gear still matters more at any specific tier.","alternativesConsidered":["Only HP bonus to keep combat unchanged","Percentage bonuses that scale more aggressively"],"date":"2026-03-28"}],"implementation":"1. gameStore: xp: number, level: number (both persist across deaths). 2. gainXp(amount) action: xp += amount, compute new level via levelFromXp() (level N requires N*(N+1)/2 * 100 XP), call set if level changed (+5 maxHp/level, +2 maxMana for level delta). 3. combatStore.handleVictory: xpReward = monster.baseXp * floor * tierMultiplier; calls useGameStore.getState().gainXp(xpReward). 4. buildPlayerStats: accepts playerLevel, applies +5 maxHp/level, +1 damage/level, +1 defense/level (Warrior +2), +2% critChance every 5 levels. 5. HUD: level badge + XP bar. 6. LevelUpOverlay: shown in CombatScreen on level-up. Displays the newly unlocked skill if one unlocks at this level. When no skill unlocks, shows a dimmed 'NEXT SKILL' preview card: the earliest skill for this class with levelRequired > current level, showing name, description, and 'unlocks at level N'. This helps players understand the skill unlock curve even when a level-up grants only stat bonuses. 7. CombatScreen: two useState values — levelUpSkill (the skill that just unlocked, or null) and levelUpNextSkill (the next upcoming skill). Level-up useEffect computes both: `setLevelUpSkill(unlocked); setLevelUpNextSkill(nextUpcoming)` where nextUpcoming = SKILLS filtered by classId with levelRequired > current level, sorted ascending, [0] ?? null.","knownLimitations":["No manual stat allocation in v1","No XP from non-combat encounters (chests, shrines)","Level cap is infinite but untested above level 50 for balance"],"tags":["combat","progression","xp","leveling","persistence","hud"],"annotations":[],"lineage":{"children":["feat-2026-061"]},"successCriteria":"Killing a monster always grants XP visible in combat log. Level increments correctly at XP thresholds. buildPlayerStats reflects level bonuses in actual combat damage/HP. HUD shows level and XP bar. Level survives death and floor reset. LevelUpOverlay shows unlocked skill (if any) or the next upcoming skill preview.","domain":"progression","statusHistory":[{"from":"draft","to":"active","date":"2026-03-28"},{"from":"active","to":"frozen","date":"2026-03-28"}],"revisions":[{"date":"2026-03-28","author":"claude","fields_changed":["analysis","implementation","decisions","successCriteria"],"reason":"Initial fill from design session"},{"date":"2026-03-28","author":"claude","fields_changed":["decisions"],"reason":"Fix decisions schema"},{"date":"2026-03-31","author":"claude","fields_changed":["implementation","successCriteria"],"reason":"BMAD session 2: add next-skill preview to LevelUpOverlay (levelUpNextSkill state, nextSkill prop, dimmed preview card when no skill unlocks at current level)"}],"userGuide":"Every monster you kill grants XP. As you accumulate XP your level increases permanently — even dying does not reset your level. Each level gives +5 max HP, +1 damage. Defense per level depends on your class (+2 for Warrior, +0 for Rogue/Sorcerer). Every 5 levels adds +2% crit chance. Your level is shown in the HUD.\n\nMax mana also scales with level, but the formula is class-specific:\n- Warrior: 20 + level×4\n- Rogue: 35 + level×6\n- Sorcerer: 60 + level×6\n\n**Level-up overlay:** When you gain a level mid-combat, a full-screen overlay pauses the fight. If a skill unlocks at this level, it is shown prominently. If no skill unlocks, the overlay previews your *next upcoming skill* (dimmed) so you always know what you're building toward.\n\nThink of level as a permanent gear slot that keeps improving the longer you play.","componentFile":"src/store/gameStore.ts","npmPackages":[],"publicInterface":[{"name":"gainXp","type":"(amount: number) => void","description":"Add XP to persistent total; triggers level-up if threshold crossed"},{"name":"level","type":"number (gameStore)","description":"Current player level, persists across deaths"},{"name":"xp","type":"number (gameStore)","description":"Total accumulated XP, persists across deaths"}],"externalDependencies":[],"lastVerifiedDate":"2026-03-31","codeSnippets":[{"label":"Level from total XP","snippet":"function levelFromXp(xp: number): number {\n  let level = 0\n  while (xpForLevel(level + 1) <= xp) level++\n  return level\n}\n// Level 0 is the starting level (no XP spent)"},{"label":"buildPlayerStats with level","snippet":"const lvlBonus = { damage: level, defense: level, life: level * 5, critChance: Math.floor(level / 5) * 2 }"},{"label":"LevelUpOverlay: next-skill preview when nothing unlocks","snippet":"// CombatScreen level-up useEffect\nconst unlocked = SKILLS.find(s => s.classId === classId && s.levelRequired === level) ?? null\nconst nextUpcoming = SKILLS\n  .filter(s => s.classId === classId && s.levelRequired > level)\n  .sort((a, b) => a.levelRequired - b.levelRequired)[0] ?? null\nsetLevelUpSkill(unlocked)\nsetLevelUpNextSkill(nextUpcoming)\n\n// LevelUpOverlay renders:\n// If newSkill is null but nextSkill exists:\n//   <View style={styles.skillCardNext}> (dimmed)\n//     <Text>NEXT SKILL</Text>\n//     <Text>{nextSkill.glyph}</Text>\n//     <Text>{nextSkill.name}</Text>\n//     <Text>unlocks at level {nextSkill.levelRequired}</Text>\n//   </View>"}],"toolingAnnotations":[]},{"featureKey":"feat-2026-061","title":"XP from non-combat encounters (chests, shrines, secrets)","status":"draft","problem":"XP is only awarded from killing monsters. Chests, shrines, and secret rooms grant no XP, making exploration feel unrewarded and deprioritized relative to combat grinding.","schemaVersion":1,"tags":["combat","progression","xp","leveling","persistence","hud"],"lineage":{"parent":"feat-2026-037","spawnReason":"deferred mechanic: non-combat XP sources were explicitly excluded from the initial XP implementation"},"domain":"progression"},{"featureKey":"feat-2026-034","title":"D2Game — iOS Grid RPG","status":"frozen","problem":"Build a mobile game combining Pokemon-style 50×50 grid exploration, Diablo 2 loot philosophy (even normal items can be exciting via sockets/runewords), and roguelite floor progression. No existing iOS game nails all three simultaneously in a pick-up-and-play format.","analysis":"Core loop: move on grid → trigger encounter → fast combat gate (<5s) → loot resolves → inventory puzzle → find exit → next floor. Priority hierarchy: Map & Exploration > Encounters > Loot System > Inventory Management >> Combat. Combat is a transaction, not a feature. The fun is in the hunt, the drop, and the Tetris inventory puzzle. Endgame players hunt rare encounters and rare item combinations, not specific fights.","decisions":[{"decision":"Seeded PRNG (mulberry32) for all randomness","rationale":"Every run must be reproducible from a seed. This enables deterministic bun tests, bug reproduction via seed+steps, and future daily-challenge mode. Non-seeded Math.random() would make tests flaky.","alternativesConsidered":["Math.random() — not seedable, untestable","xoshiro128 — slightly better distribution but mulberry32 is simpler and sufficient"],"date":"2026-03-28"},{"decision":"Engine-first development: all game logic written and bun-tested before any UI screen exists","rationale":"Game systems (loot, combat, grid) are pure data transformations. Keeping them React-free means they can be tested headless, simulated at scale (10k items, 1000 combats), and iterated without a device. UI that depends on untested engine code leads to hard-to-debug emergent bugs.","alternativesConsidered":["Build UI first, engine emerges from component state — common in game jams, hard to test","Unity/Godot — built-in test frameworks but abandons RN expertise"],"date":"2026-03-28"},{"decision":"Combat as a fast gate (3–6 rounds, numbers-only UI)","rationale":"Playtesting Diablo 2 and similar games shows the dopamine comes from the drop, not the fight. Combat complexity competes for design budget with loot and inventory. Keeping combat to a transaction screen (<5s) lets players do more runs and see more loot.","alternativesConsidered":["Turn-based tactics with positioning — fun but requires 10× more design work","Real-time action combat — incompatible with a grid-step model"],"date":"2026-03-28"},{"decision":"Normal (white) items are valuable via the socket/runeword system","rationale":"D2’s most memorable items are runewords built into white bases. If white items are junk, players stop picking them up and loot excitement drops by 50%. Every white drop with sockets must show a tooltip flag: ‘Runeword candidate (N sockets)’.","alternativesConsidered":["Only magic+ items are interesting — simpler but loses D2 DNA","Crafting system — too complex for v1"],"date":"2026-03-28"},{"decision":"10×4 Tetris inventory grid with physical item sizes","rationale":"Inventory management as a spatial puzzle is one of D2’s most beloved secondary systems. Charms provide passive bonuses but occupy space, creating a real tradeoff that drives decisions mid-run. A flat list inventory eliminates this tension.","alternativesConsidered":["Flat list with item count limit — simpler but no spatial tension","Unlimited stash — removes one of the core decision loops"],"date":"2026-03-28"}],"implementation":"Expo (React Native) + TypeScript. Engine layer (src/engine/) is pure TS — zero React, 100% bun-testable. Rendering: plain React Native for all UI (combat, inventory, menus, grid). State: Zustand slices (gridStore, combatStore, inventoryStore, gameStore, settingsStore). Persistence: @react-native-async-storage/async-storage via src/services/persistence.ts (saveGame/scheduleSave/loadGame). Seeded PRNG (mulberry32) ensures every run is reproducible by seed. Sim scripts (sim/) allow headless floor/loot/combat simulation without a device. Class system: 3 classes (Warrior/Rogue/Sorcerer) each with unique stats and 4–5 skills, balanced via Monte Carlo sim. Shared stash persists across deaths in gameStore. Town screen provides character overview + stash management.\n\nCurrent UX state (verified 2026-03-31):\n- HUD: stamina bar hidden when ST > 30%; compact badge + bar shown when ST ≤ 30%. Reduces HUD clutter during normal play.\n- GridScreen zoom: persisted to settingsStore.zoomLevel (0|1|2) so preferred zoom survives app restarts.\n- Zoom lock toggle: when active, single-finger swipe adjusts zoom instead of moving the character. Zoom-lock button adjacent to zoom in/out.\n- Ghost Echo ambient hint: shown once in GridScreen (after 2s delay) when graveyard has items and no echo is active. markGhostEchoHintSeen() ensures it never repeats.\n- Combat RNG: fully deterministic — seed ^ (floor * 0x9e3779b9) ^ (roundNumber * 0x6b429177) with unique offsets for attacks, skills, and loot.\n- Ascension: ASCEND button on victory screen (when graveyard non-empty) starts a new run with pre-loaded Ghost Echo and increments careerStats.ascensions.","knownLimitations":["Requires Mac + Apple Developer account for TestFlight distribution — dev build deferred until Mac access","Pixel art assets not yet sourced — Phase 5 depends on CC0 asset packs (Dungeon Tileset II by 0x72)","No multiplayer or cloud save — single device only in v1"],"tags":["game","ios","expo","react-native","roguelite","loot-system","grid-exploration"],"annotations":[],"lineage":{"children":["feat-2026-035","feat-2026-036","feat-2026-037","feat-2026-038","feat-2026-039","feat-2026-040","feat-2026-041","feat-2026-042","feat-2026-043","feat-2026-044"]},"successCriteria":"Phase 0 (engine): bun test green on all 6 engine modules, sim scripts produce believable loot/encounter distributions. Phase 1 (text UI): fully playable 5-floor run using only text labels and colored boxes — fun validated before any art. Phase 5 (polish): TestFlight build ships with pixel art and sound.","domain":"game/mobile","statusHistory":[{"from":"draft","to":"active","date":"2026-03-28"},{"from":"active","to":"frozen","date":"2026-03-29"}],"revisions":[{"date":"2026-03-28","author":"claude","fields_changed":["problem","analysis","implementation","decisions","successCriteria"],"reason":"Initial full feature definition after Phase 0 engine build — all core systems designed and tested"},{"date":"2026-03-28","author":"claude","fields_changed":["decisions"],"reason":"Fix decisions and codeSnippets to match feature-schema object structure"},{"date":"2026-03-31","author":"claude","fields_changed":["implementation"],"reason":"BMAD session 2: update implementation (AsyncStorage not expo-sqlite, current UX state), userGuide (zoom lock, stamina HUD, Ghost Echo hint, ascension, first-clear overlay, correct death mechanic — equipped only)"}],"userGuide":"## How to Play\n1. Pick a class at the start of each run: **Warrior** (easy), **Rogue** (medium), **Sorcerer** (hard)\n2. Use the D-pad (or swipe) to move your character on the dungeon grid\n3. Fog of war lifts as you explore — each step reveals the area around you\n4. Stepping on an unvisited tile may trigger an encounter (combat, chest, shrine, or empty)\n5. In combat: tap Attack, use a skill (mana-gated, class-specific), Use Potion to heal, or Flee\n6. After victory, items drop — tap TAKE to add to bag, or leave them\n7. Open BAG (bottom of grid screen) to manage your 20-slot inventory\n8. Tap TOWN to return to the Town screen — deposit items to the shared stash, equip from stash, and review your character stats. **Note: visiting town from the dungeon has a cost — use it when it matters.**\n9. Find the exit staircase (glowing tile) to descend to the next floor\n10. Clear floor 10 to advance to the next difficulty tier — the first clear of each tier shows a special '✦ FIRST CLEAR ✦' overlay\n11. Death sacrifices one equipped item (quality-weighted) from your gear. Your bag is fully wiped. Stashed items are always safe.\n\n## Grid Controls\n- **Swipe / D-pad**: move character\n- **Pinch**: zoom grid (3 levels: small / medium / large). Your zoom preference is saved across sessions.\n- **Zoom lock button** (🔒): when active, single-finger swipe adjusts zoom instead of moving. Useful for precise navigation on small screens.\n\n## Ghost Echo\nFrom the Graveyard screen, tap a sacrificed item to invoke its Ghost Echo — you gain 25% of its stats for 1 floor. A one-time ambient hint appears on the dungeon grid when your graveyard is non-empty.\n\n## Ascension\nOn the victory screen, if your graveyard has entries, press **ASCEND** to start a new run with Ghost Echo pre-loaded from your most recent sacrifice. Your ascension count (✦×N) appears on the main menu.\n\n## Testing (Dev)\n```\nbun test src/engine                    # run all engine tests\nbun run src/sim/classBalanceSim.ts     # 15-scenario class balance check\nbun run src/sim/runSim.ts              # simulate full runs headless\nnpx tsc --noEmit                       # TypeScript check (0 errors target)\n```","componentFile":"src/engine/rng.ts, src/engine/grid.ts, src/engine/encounter.ts, src/engine/loot.ts, src/engine/affixes.ts, src/engine/monsters.ts, src/engine/combat.ts, src/engine/inventory.ts, src/sim/runSim.ts, src/sim/lootSim.ts, src/sim/combatSim.ts, src/sim/debugState.ts, src/data/items.ts, src/data/monsters.ts, src/data/runewords.ts","npmPackages":["expo","react-native","@shopify/react-native-skia","zustand","react-native-reanimated","expo-sqlite"],"publicInterface":[{"name":"generateItem","type":"function(rng: Rng, opts: GenerateOptions) => Item","description":"Generate a fully resolved item: quality roll, affix pool pick, socket count, runeword check, display name. Pure function, no side effects."},{"name":"rollLoot","type":"function(rng: Rng, encounterType: string, floor: number, magicFind?: number) => Item[]","description":"Roll a full loot drop for an encounter type. Returns 0–3 items depending on encounter tier."},{"name":"simulateCombat","type":"function(rng: Rng, player: PlayerCombatStats, monster: MonsterInstance) => CombatResult","description":"Auto-resolve a full combat. Returns outcome, round log, HP remaining, XP gained. Used by sim scripts."},{"name":"generateFloor","type":"function(seed: number, rng: Rng) => { grid, playerStart, exitPos, rooms }","description":"BSP dungeon generation. Deterministic by seed. Returns 50×50 tile grid with rooms and corridors carved."},{"name":"makeRng","type":"function(seed: number) => Rng","description":"Create a seeded PRNG (mulberry32). All game randomness must flow through this."}],"externalDependencies":[],"lastVerifiedDate":"2026-03-31","codeSnippets":[{"label":"Seeded RNG — deterministic item generation","snippet":"import { makeRng, roll, pick } from './engine/rng'\nconst rng = makeRng(seed)\nconst dmg = roll(rng, 10, 20)  // same seed = same value every time\nconst item = generateItem(rng, { floor: 5, magicFind: 150 })"},{"label":"Roll loot from an encounter","snippet":"import { rollLoot } from './engine/loot'\n// 'rare' encounter on floor 8, 100% magic find\nconst drops = rollLoot(rng, 'rare', 8, 100)\n// drops: Item[] with quality/affixes/sockets/displayName resolved"},{"label":"Headless sim commands (no device needed)","snippet":"bun run sim:floors 10 150   # 10 floors, 150% magic find — prints all drops\nbun run sim:combat 15 ancient  # 1000 combats at floor 15 ancient tier\nbun run debug:state            # pretty-print game state snapshot\nbun test src/engine            # 94 tests, <200ms"}],"toolingAnnotations":[]}];

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function completeness(f){
  var checks=[!!f.analysis,!!f.implementation,!!(f.decisions&&f.decisions.length),
    !!f.successCriteria,!!(f.knownLimitations&&f.knownLimitations.length),
    !!(f.tags&&f.tags.length),!!f.domain];
  return Math.round(checks.filter(Boolean).length/checks.length*100);
}

function statusColor(s){
  switch(s){
    case 'active':return '#4aad72';
    case 'frozen':return '#5b82cc';
    case 'deprecated':return '#cc5b5b';
    default:return '#c4a255';
  }
}
function statusBgColor(s){
  switch(s){
    case 'active':return 'rgba(74,173,114,0.14)';
    case 'frozen':return 'rgba(91,130,204,0.14)';
    case 'deprecated':return 'rgba(204,91,91,0.14)';
    default:return 'rgba(196,162,85,0.14)';
  }
}

// ── Column order & labels ─────────────────────────────────────────────────────
var COL_ORDER=['active','frozen','draft','deprecated'];
var COL_LABELS={active:'Active',frozen:'Frozen',draft:'Draft',deprecated:'Deprecated'};

// ── State ─────────────────────────────────────────────────────────────────────
var filterDomain='';
var sortMode='default';

// ── Build board ───────────────────────────────────────────────────────────────
var board=document.getElementById('board');
var colMeta={}; // status -> {el, bodyEl, emptyEl, cards:[{el, feature}]}

function buildBoard(){
  board.innerHTML='';
  colMeta={};
  if(!features.length)return;

  // Determine which statuses have features
  var statusSet=new Set(features.map(function(f){return f.status;}));
  var activeCols=COL_ORDER.filter(function(s){return statusSet.has(s);});

  activeCols.forEach(function(status){
    var col=document.createElement('div');
    col.className='col';
    col.dataset.status=status;

    var sColor=statusColor(status);
    var sBg=statusBgColor(status);
    var label=COL_LABELS[status]||status;

    // Header
    var header=document.createElement('div');
    header.className='col-header';
    header.innerHTML=
      '<div class="col-header-left">'
        +'<span class="col-status-name" style="color:'+sColor+'">'+esc(label)+'</span>'
        +'<span class="col-count" style="background:'+sBg+';color:'+sColor+';" data-count-el="'+status+'">0</span>'
      +'</div>'
      +'<span class="col-chevron">▾</span>';
    header.addEventListener('click',function(){
      col.classList.toggle('collapsed');
    });

    // Body
    var body=document.createElement('div');
    body.className='col-body';

    // Empty placeholder
    var empty=document.createElement('div');
    empty.className='col-empty';
    empty.textContent='No features';
    body.appendChild(empty);

    col.appendChild(header);
    col.appendChild(body);
    board.appendChild(col);

    colMeta[status]={
      el:col,
      bodyEl:body,
      emptyEl:empty,
      countEl:header.querySelector('[data-count-el]'),
      cards:[]
    };
  });

  // Create cards
  features.forEach(function(f){
    var status=f.status;
    if(!colMeta[status])return;

    var comp=completeness(f);
    var dcount=f.decisions?f.decisions.length:0;
    var lcount=f.knownLimitations?f.knownLimitations.length:0;
    var tags=f.tags||[];
    var analysis=f.analysis||'';
    var analysisTrunc=analysis.length>300?analysis.slice(0,297)+'…':analysis;
    var problem=f.problem||'';

    var card=document.createElement('div');
    card.className='card';
    card.dataset.featureKey=f.featureKey;
    card.dataset.domain=f.domain||'';
    card.dataset.title=f.title;
    card.dataset.comp=String(comp);
    card.dataset.decisions=String(dcount);

    var domainHtml=f.domain?'<div class="card-domain">'+esc(f.domain)+'</div>':'';
    var decisionsHtml=dcount>0?'<span class="card-decisions-icon">◆</span><span>'+dcount+' decision'+(dcount===1?'':'s')+'</span>':'';
    var tagsHtml=tags.map(function(t){return '<span class="card-tag">'+esc(String(t))+'</span>';}).join('');
    var expandMetaHtml=
      '<div class="card-expand-meta">'
      +'<div>decisions&nbsp;<span>'+dcount+'</span></div>'
      +'<div>limitations&nbsp;<span>'+lcount+'</span></div>'
      +'</div>';
    var analysisSection=analysis?
      '<div class="card-analysis-section">'
        +'<button class="show-more-btn" data-action="analysis">Show analysis ↓</button>'
        +'<div class="card-analysis">'+esc(analysisTrunc)+'</div>'
      +'</div>'
      :'';

    card.innerHTML=
      '<div class="card-key">'+esc(f.featureKey)+'</div>'
      +'<div class="card-title">'+esc(f.title)+'</div>'
      +domainHtml
      +(decisionsHtml?'<div class="card-meta">'+decisionsHtml+'</div>':'')
      +'<div class="card-expand">'
        +(problem?'<div class="card-problem">'+esc(problem)+'</div>':'')
        +(tags.length?'<div class="card-tags">'+tagsHtml+'</div>':'')
        +expandMetaHtml
        +analysisSection
      +'</div>'
      +'<div class="card-comp-bar"><div class="card-comp-fill" style="width:'+comp+'%"></div></div>';

    // Toggle expand on click (but not on show-more button)
    card.addEventListener('click',function(e){
      if(e.target.dataset&&e.target.dataset.action==='analysis'){
        // handled below
        return;
      }
      var wasExpanded=card.classList.contains('expanded');
      // collapse all cards in this column first
      colMeta[status].cards.forEach(function(item){
        item.el.classList.remove('expanded');
        var t=item.el.querySelector('.card-title');
        if(t)t.classList.remove('expanded');
        item.el.classList.remove('analysis-open');
        var btn=item.el.querySelector('[data-action="analysis"]');
        if(btn)btn.textContent='Show analysis ↓';
      });
      if(!wasExpanded){
        card.classList.add('expanded');
        var titleEl=card.querySelector('.card-title');
        if(titleEl)titleEl.classList.add('expanded');
      }
    });

    // Show-more for analysis
    card.addEventListener('click',function(e){
      if(!e.target.dataset||e.target.dataset.action!=='analysis')return;
      e.stopPropagation();
      var isOpen=card.classList.contains('analysis-open');
      card.classList.toggle('analysis-open',!isOpen);
      e.target.textContent=isOpen?'Show analysis ↓':'Hide analysis ↑';
    });

    colMeta[status].bodyEl.appendChild(card);
    colMeta[status].cards.push({el:card,feature:f});
  });

  renderCards();
}

// ── Render / filter / sort ────────────────────────────────────────────────────
function renderCards(){
  COL_ORDER.forEach(function(status){
    var meta=colMeta[status];
    if(!meta)return;

    // Sort
    var sorted=meta.cards.slice();
    if(sortMode==='alpha'){
      sorted.sort(function(a,b){return a.feature.title.localeCompare(b.feature.title);});
    } else if(sortMode==='completeness'){
      sorted.sort(function(a,b){return completeness(b.feature)-completeness(a.feature);});
    } else if(sortMode==='decisions'){
      var dc=function(f){return f.decisions?f.decisions.length:0;};
      sorted.sort(function(a,b){return dc(b.feature)-dc(a.feature);});
    } else {
      sorted.sort(function(a,b){return a.feature.featureKey.localeCompare(b.feature.featureKey);});
    }

    // Re-order DOM
    var body=meta.bodyEl;
    sorted.forEach(function(item){body.appendChild(item.el);});
    // Keep empty placeholder at end
    body.appendChild(meta.emptyEl);

    // Apply filter visibility
    var visible=0;
    sorted.forEach(function(item){
      var show=!filterDomain||item.feature.domain===filterDomain;
      item.el.classList.toggle('hidden',!show);
      if(show)visible++;
    });

    // Update count and empty state
    meta.countEl.textContent=String(visible);
    meta.emptyEl.classList.toggle('hidden',visible>0);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('domain-select').addEventListener('change',function(){
  filterDomain=this.value;
  renderCards();
});

document.getElementById('sort-select').addEventListener('change',function(){
  sortMode=this.value;
  renderCards();
});

// ── Init ──────────────────────────────────────────────────────────────────────
buildBoard();

})();
</script>
